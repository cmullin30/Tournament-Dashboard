<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;flex-direction:column;gap:{{ board.gap }};width:100%;align-items:center;">
  <div style="display:flex;flex-wrap:wrap;gap:24px;justify-content:center;align-items:flex-start;width:100%;">
    <sc-for list="{{ board.pods }}" as="pod" hint-placeholder-count="2">
      <div style="{{ pod.cardStyle }}">
        <div style="{{ pod.titleStyle }}">{{ pod.title }}</div>
        <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px;">
          <sc-for list="{{ pod.standings }}" as="st" hint-placeholder-count="4">
            <div style="{{ st.rowStyle }}">
              <span style="{{ st.badgeStyle }}">{{ st.badge }}</span>
              <span style="{{ st.nameStyle }}">{{ st.name }}</span>
              <span style="{{ st.recordStyle }}">{{ st.record }}</span>
              <span style="{{ st.diffStyle }}">{{ st.diff }}</span>
              <sc-if value="{{ st.advances }}" hint-placeholder-val="{{ false }}"><span style="{{ st.advStyle }}">ADV</span></sc-if>
            </div>
          </sc-for>
        </div>
        <div style="{{ pod.gridWrapStyle }}">
          <div style="{{ pod.gridStyle }}">
            <div style="{{ pod.cornerStyle }}"></div>
            <sc-for list="{{ pod.headers }}" as="h" hint-placeholder-count="4">
              <div style="{{ h.style }}">{{ h.label }}</div>
            </sc-for>
            <div style="{{ pod.totalsHeader.style }}">{{ pod.totalsHeader.label }}</div>
            <sc-for list="{{ pod.rows }}" as="row" hint-placeholder-count="4">
              <div style="{{ row.headStyle }}">{{ row.badge }}</div>
              <sc-for list="{{ row.cells }}" as="c" hint-placeholder-count="4">
                <div style="{{ c.tdStyle }}">
                  <sc-if value="{{ c.hasInput }}" hint-placeholder-val="{{ false }}">
                    <input value="{{ c.value }}" onChange="{{ c.onScore }}" style="{{ c.inputStyle }}" />
                  </sc-if>
                  <sc-if value="{{ c.textOnly }}" hint-placeholder-val="{{ true }}">
                    <span style="{{ c.textStyle }}">{{ c.display }}</span>
                  </sc-if>
                </div>
              </sc-for>
              <div style="{{ row.total.style }}">{{ row.total.display }}</div>
            </sc-for>
          </div>
        </div>
      </div>
    </sc-for>
  </div>
  <sc-if value="{{ board.hasFinal }}" hint-placeholder-val="{{ false }}">
    <div style="{{ board.finalWrapStyle }}">
      <div style="{{ board.finalTitleStyle }}">Pod Final</div>
      <div style="{{ board.finalCardStyle }}">
        <sc-for list="{{ board.final.slots }}" as="sl" hint-placeholder-count="2">
          <div style="{{ sl.rowStyle }}" onClick="{{ sl.onPick }}">
            <span style="{{ sl.nameStyle }}">{{ sl.name }}</span>
            <sc-if value="{{ sl.hasInput }}" hint-placeholder-val="{{ false }}">
              <input value="{{ sl.score }}" onChange="{{ sl.onScore }}" style="{{ sl.scoreStyle }}" />
            </sc-if>
            <sc-if value="{{ sl.textOnly }}" hint-placeholder-val="{{ false }}">
              <span style="{{ sl.scoreTextStyle }}">{{ sl.scoreText }}</span>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:540},&quot;board&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
