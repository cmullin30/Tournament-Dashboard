  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in-bottom:12px;\">\n              <span style=\"{{ tc.labelStyle }}\">{{ tc.courtLabel }}<\u002Fspan>\n              <sc-if value=\"{{ tc.occupied }}\" hint-placeholder-val=\"{{ true }}\">\n                <span style=\"{{ tc.divStyle2 }}\">{{ tc.divName }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <sc-if value=\"{{ tc.occupied }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"{{ tc.tagStyle }}\">{{ tc.tag }}<\u002Fdiv>\n              <div style=\"{{ tc.nameStyle }}\">{{ tc.aName }}<\u002Fdiv>\n              <div style=\"{{ tc.vsStyle }}\">VS<\u002Fdiv>\n              <div style=\"{{ tc.nameStyle }}\">{{ tc.bName }}<\u002Fdiv>\n              <div style=\"{{ tc.elapsedStyle }}\">{{ tc.elapsed }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ tc.empty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"{{ tc.openStyle }}\">Open<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SETUP MODAL ============ -->\n  <sc-if value=\"{{ setupOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,20,0.55);display:flex;align-items:center;justify-content:center;z-index:50;\" onclick=\"{{ onCloseSetup }}\">\n      <div style=\"background:#FBF8F1;border-radius:14px;width:560px;max-width:92vw;max-height:84vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,0.35);\" onclick=\"{{ stopClick }}\">\n        <div style=\"padding:18px 24px;border-bottom:1px solid #E2D9C4;display:flex;justify-content:space-between;align-items:center;\">\n          <div style=\"font-family:'Marcellus',serif;font-size:20px;color:#1E3A2C;\">Edit Draw — {{ setupDivName }}<\u002Fdiv>\n          <button onclick=\"{{ onCloseSetup }}\" style=\"border:none;background:transparent;font-size:18px;cursor:pointer;color:#6B6A5E;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ setupIsCompass }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:18px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #EFE9DA;\">\n            <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Bracket Size<\u002Fspan>\n            <button onclick=\"{{ onSetCompass8 }}\" style=\"{{ compass8BtnStyle }}\">8<\u002Fbutton>\n            <button onclick=\"{{ onSetCompass16 }}\" style=\"{{ compass16BtnStyle }}\">16<\u002Fbutton>\n            <span style=\"font-size:12px;color:#9A9480;\">compass draw works best at 8 or 16<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ setupIsCompass }}\" hint-placeholder-val=\"{{ false }}\">\n        <\u002Fsc-if>\n        <sc-if value=\"{{ setupIsPods }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 24px;border-bottom:1px solid #EFE9DA;\">\n            <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">Round-robin pods use a fixed field of <b style=\"color:#1E3A2C;\">8 teams<\u002Fb> — snake-seeded into two pods of four. Seeds 1–8 below set the pod split.<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n              <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Advance<\u002Fspan>\n              <button onclick=\"{{ onSetAdv1 }}\" style=\"{{ setupAdv1Style }}\">1 per pod<\u002Fbutton>\n              <button onclick=\"{{ onSetAdv2 }}\" style=\"{{ setupAdv2Style }}\">2 per pod<\u002Fbutton>\n              <span style=\"font-size:12px;color:#9A9480;\">\n                <sc-if value=\"{{ setupAdv1 }}\" hint-placeholder-val=\"{{ false }}\">pod winners meet in a single final<\u002Fsc-if>\n                <sc-if value=\"{{ setupAdv2 }}\" hint-placeholder-val=\"{{ true }}\">top two cross over into a 4-team championship draw<\u002Fsc-if>\n              <\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ setupIsSingle }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"padding:18px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #EFE9DA;\">\n            <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Bracket Size<\u002Fspan>\n            <button onclick=\"{{ onSizeDown }}\" style=\"width:28px;height:28px;border-radius:6px;border:1px solid #D9CDA9;background:#EFE9DA;cursor:pointer;font-size:15px;\">–<\u002Fbutton>\n            <span style=\"font-family:'Marcellus',serif;font-size:18px;width:24px;text-align:center;\">{{ setupSize }}<\u002Fspan>\n            <button onclick=\"{{ onSizeUp }}\" style=\"width:28px;height:28px;border-radius:6px;border:1px solid #D9CDA9;background:#EFE9DA;cursor:pointer;font-size:15px;\">+<\u002Fbutton>\n            <span style=\"font-size:12px;color:#9A9480;\">teams (6–16); empty slots are byes<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"padding:10px 24px 22px;display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ setupTeams }}\" as=\"tm\" hint-placeholder-count=\"8\">\n            <div draggable=\"true\" style=\"{{ tm.rowStyle }}\" ondragstart=\"{{ tm.onDragStart }}\" ondragover=\"{{ tm.onDragOver }}\" ondrop=\"{{ tm.onDrop }}\" ondragend=\"{{ tm.onDragEnd }}\">\n              <span style=\"cursor:grab;color:#C4BBA0;font-size:14px;padding:0 2px;user-select:none;\" title=\"Drag to reseed\">⠿<\u002Fspan>\n              <span style=\"width:20px;font-size:12px;color:#9A9480;font-weight:700;\">{{ tm.seed }}<\u002Fspan>\n              <input value=\"{{ tm.p1 }}\" onchange=\"{{ tm.onP1 }}\" placeholder=\"Player 1\" style=\"flex:1;font-size:13px;border:1px solid #E2D9C4;border-radius:6px;padding:7px 10px;\">\n              <span style=\"color:#B08A4F;\">/<\u002Fspan>\n              <input value=\"{{ tm.p2 }}\" onchange=\"{{ tm.onP2 }}\" placeholder=\"Player 2\" style=\"flex:1;font-size:13px;border:1px solid #E2D9C4;border-radius:6px;padding:7px 10px;\">\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:14px 24px;border-top:1px solid #E2D9C4;display:flex;justify-content:flex-end;\">\n          <button onclick=\"{{ onCloseSetup }}\" style=\"background:#1E3A2C;color:#F6F1E3;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ LIVE CONSOLE ============ -->\n  <sc-if value=\"{{ consoleOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:60;background:#F3F1E8;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"flex:0 0 auto;background:#1E3A2C;color:#F6F1E3;padding:16px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <img src=\"1f1e0225-3b1b-42c0-a326-85b36e39844f\" alt=\"Club crest\" style=\"height:38px;width:auto;flex:0 0 auto;\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:#C0623C;box-shadow:0 0 0 4px rgba(192,98,60,0.25);\"><\u002Fspan>\n          <span style=\"font-family:'Marcellus',serif;font-size:22px;\">Live Console<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <button onclick=\"{{ onUndo }}\" disabled=\"{{ consoleUndoDisabled }}\" style=\"{{ undoBtnStyle }}\">↩ Undo<\u002Fbutton>\n          <button onclick=\"{{ onToggleSummary }}\" style=\"font-size:14px;font-weight:700;border-radius:999px;padding:9px 18px;cursor:pointer;border:1px solid rgba(201,169,106,0.6);background:transparent;color:#C9A96A;white-space:nowrap;\">🏁 Results Summary<\u002Fbutton>\n          <button onclick=\"{{ onCloseConsole }}\" style=\"font-size:14px;font-weight:700;border-radius:999px;padding:9px 18px;cursor:pointer;border:1px solid rgba(246,241,227,0.4);background:transparent;color:#F6F1E3;\">✕ Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;overflow-y:auto;padding:22px 26px 40px;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;\">\n          <div style=\"font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#B08A4F;\">Courts — tap to score, drag ⠿ to swap<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <span style=\"font-size:11px;font-weight:700;color:#8A8362;text-transform:uppercase;letter-spacing:1px;\">Courts<\u002Fspan>\n              <button onclick=\"{{ onCourtsDown }}\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid #D9CDA9;background:#FBF8F1;cursor:pointer;font-size:16px;color:#1E3A2C;\">–<\u002Fbutton>\n              <span style=\"font-family:'Marcellus',serif;font-size:18px;width:24px;text-align:center;color:#1E3A2C;\">{{ courtsCount }}<\u002Fspan>\n              <button onclick=\"{{ onCourtsUp }}\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid #D9CDA9;background:#FBF8F1;cursor:pointer;font-size:16px;color:#1E3A2C;\">+<\u002Fbutton>\n            <\u002Fdiv>\n            <button onclick=\"{{ onToggleShuffle }}\" style=\"{{ shuffleBtnStyle }}\">🔀 Shuffle<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px;\">\n          <sc-for list=\"{{ consoleView.courtCards }}\" as=\"cc\" hint-placeholder-count=\"4\">\n            <div style=\"{{ cc x;font-weight:800;white-space:nowrap;\">{{ cr.courtLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ cr.open }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"flex:1;font-size:12px;color:#C4BBA0;font-style:italic;padding-left:4px;\">Open — no match this wave<\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ cr.hasMatch }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"{{ cr.divStyle }};flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;padding:0 8px;height:20px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:0.3px;white-space:nowrap;\">{{ cr.divName }}<\u002Fspan>\n                    <span style=\"{{ cr.podStyle }};flex:0 0 auto;font-size:9px;font-weight:800;letter-spacing:0.3px;padding:3px 7px;border-radius:999px;white-space:nowrap;\">{{ cr.podTag }}<\u002Fspan>\n                    <span style=\"flex:1;min-width:0;font-size:12px;color:#26271F;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ cr.leftName }}<\u002Fspan>\n                    <input value=\"{{ cr.leftVal }}\" onchange=\"{{ cr.onLeft }}\" inputmode=\"numeric\" style=\"flex:0 0 auto;width:36px;height:30px;text-align:center;font-size:14px;font-weight:700;border:1.5px solid #D9CDA9;border-radius:6px;background:#FFFFFF;color:#1E3A2C;outline:none;box-sizing:border-box;\">\n                    <span style=\"flex:0 0 auto;font-size:11px;color:#B08A4F;\">vs<\u002Fspan>\n                    <input value=\"{{ cr.rightVal }}\" onchange=\"{{ cr.onRight }}\" inputmode=\"numeric\" style=\"flex:0 0 auto;width:36px;height:30px;text-align:center;font-size:14px;font-weight:700;border:1.5px solid #D9CDA9;border-radius:6px;background:#FFFFFF;color:#1E3A2C;outline:none;box-sizing:border-box;\">\n                    <span style=\"flex:1;min-width:0;font-size:12px;color:#26271F;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ cr.rightName }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ orderOfPlay.hasBracketDivs }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;color:#9A9480;padding:14px 4px 0;border-top:1px solid #EFE9DA;margin-top:14px;\">Bracket divisions enter scores on the bracket itself — click a team to advance them.<\u002Fdiv>\n          <\u002Fsc-if>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PRE-TOURNAMENT BRIEFING ============ -->\n  <sc-if value=\"{{ briefingOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:60;background:#F3F1E8;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"flex:0 0 auto;background:#1E3A2C;color:#F6F1E3;padding:16px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <img src=\"1f1e0225-3b1b-42c0-a326-85b36e39844f\" alt=\"Club crest\" style=\"height:38px;width:auto;flex:0 0 auto;\">\n          <span style=\"font-family:'Marcellus',serif;font-size:22px;\">Director's Briefing<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <span style=\"font-size:14px;letter-spacing:0.5px;color:#C9A96A;font-weight:700;white-space:nowrap;\">{{ briefing.doneLabel }}<\u002Fspan>\n          <button onclick=\"{{ onToggleBriefing }}\" style=\"font-size:14px;font-weight:700;border-radius:999px;padding:9px 18px;cursor:pointer;border:1px solid rgba(246,241,227,0.4);background:transparent;color:#F6F1E3;white-space:nowrap;\">✕ Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow:auto;padding:26px 30px 60px;display:flex;flex-direction:column;align-items:center;\">\n        <div style=\"width:100%;max-width:720px;display:flex;flex-direction:column;gap:22px;\">\n\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;\">\n            <div style=\"flex:1;min-width:220px;background:#FFFFFF;border:1px solid #E2D9C4;border-radius:14px;padding:16px 18px;\">\n              <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#B08A4F;margin-bottom:6px;\">Match Format<\u002Fdiv>\n              <div style=\"font-size:17px;font-weight:700;color:#1E3A2C;\">{{ briefing.format }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-width:220px;background:#FFFFFF;border:1px solid #E2D9C4;border-radius:14px;padding:16px 18px;\">\n              <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#B08A4F;margin-bottom:8px;\">Event Structure<\u002Fdiv>\n              <sc-for list=\"{{ briefing.structure }}\" as=\"st\" hint-placeholder-count=\"2\">\n                <div style=\"margin-bottom:8px;\">\n                  <div style=\"font-size:14px;font-weight:700;color:#1E3A2C;\">{{ st.name }} · {{ st.teams }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#8A8362;\">{{ st.detail }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#FFFFFF;border:1px solid #E2D9C4;border-radius:14px;padding:16px 18px;\">\n            <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#B08A4F;margin-bottom:8px;\">Tiebreak Rules (when tied on W–L)<\u002Fdiv>\n            <div style=\"font-size:13px;color:#26271F;line-height:1.7;\">1. Head-to-head among tied teams &nbsp;→&nbsp; 2. Game differential (±) &nbsp;→&nbsp; 3. Total games won &nbsp;→&nbsp; 4. Fewest games lost &nbsp;→&nbsp; 5. 3-point playoff if still dead even.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;\">\n              <span style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;\">Talking Points<\u002Fspan>\n              <span onclick=\"{{ briefing.onResetChecks }}\" style=\"font-size:12px;color:#B08A4F;cursor:pointer;text-decoration:underline;\">Reset checkmarks<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <sc-for list=\"{{ briefing.items }}\" as=\"bi\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:10px;background:#FFFFFF;border:1px solid #E9E2CF;border-radius:12px;padding:10px 12px;\">\n                  <span onclick=\"{{ bi.onToggle }}\" style=\"{{ bi.boxStyle }}\">{{ bi.check }}<\u002Fspan>\n                  <input value=\"{{ bi.text }}\" onchange=\"{{ bi.onEdit }}\" style=\"{{ bi.inputStyle }}\">\n                  <span onclick=\"{{ bi.onUp }}\" style=\"flex:0 0 auto;cursor:pointer;color:#B8B09A;font-size:14px;padding:2px 4px;\">▲<\u002Fspan>\n                  <span onclick=\"{{ bi.onDown }}\" style=\"flex:0 0 auto;cursor:pointer;color:#B8B09A;font-size:14px;padding:2px 4px;\">▼<\u002Fspan>\n                  <span onclick=\"{{ bi.onRemove }}\" style=\"flex:0 0 auto;cursor:pointer;color:#C0623C;font-size:16px;padding:2px 6px;\">✕<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;margin-top:12px;\">\n              <input value=\"{{ briefing.draft }}\" oninput=\"{{ briefing.onDraft }}\" placeholder=\"Add a talking point…\" style=\"flex:1;font-size:15px;padding:11px 14px;border-radius:10px;border:1.5px solid #CFC3A0;background:#FBF8F1;color:#26271F;outline:none;\">\n              <button onclick=\"{{ briefing.onAdd }}\" style=\"flex:0 0 auto;background:#1E3A2C;color:#F6F1E3;border:none;border-radius:10px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;\">+ Add<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PLAYER CHECK-IN ============ -->\n  <sc-if value=\"{{ checkinOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:60;background:#F3F1E8;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"flex:0 0 auto;background:#1E3A2C;color:#F6F1E3;padding:16px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <img src=\"1f1e0225-3b1b-42c0-a326-85b36e39844f\" alt=\"Club crest\" style=\"height:38px;width:auto;flex:0 0 auto;\">\n          <span style=\"font-family:'Marcellus',serif;font-size:22px;\">Player Check-In<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <span style=\"font-size:14px;letter-spacing:0.5px;color:#C9A96A;font-weight:700;white-space:nowrap;\">{{ checkin.checkedLabel }}<\u002Fspan>\n          <button onclick=\"{{ onToggleCheckin }}\" style=\"font-size:14px;font-weight:700;border-radius:999px;padding:9px 18px;cursor:pointer;border:1px solid rgba(246,241,227,0.4);background:transparent;color:#F6F1E3;white-space:nowrap;\">✕ Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 0 auto;padding:14px 26px;background:#EAE6D8;border-bottom:1px solid #D9CDA9;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n        <input value=\"{{ checkin.search }}\" oninput=\"{{ checkin.onSearch }}\" placeholder=\"Search a player…\" style=\"flex:1;min-width:220px;max-width:420px;font-size:15px;padding:11px 16px;border-radius:10px;border:1.5px solid #CFC3A0;background:#FBF8F1;color:#26271F;outline:none;\">\n        <div style=\"flex:0 0 auto;display:flex;align-items:center;gap:10px;\">\n          <div style=\"width:160px;height:8px;border-radius:999px;background:#D9CDA9;overflow:hidden;\">\n            <div style=\"{{ checkin.progressStyle }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size:13px;font-weight:700;color:#7A7154;white-space:nowrap;\">{{ checkin.percentLabel }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow:auto;padding:24px 26px 60px;\">\n        <sc-for list=\"{{ checkin.divisions }}\" as=\"cd\" hint-placeholder-count=\"2\">\n          <div style=\"margin-bottom:30px;\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:14px;border-bottom:1px solid #DED6C0;padding-bottom:8px;\">\n              <span style=\"font-family:'Marcellus',serif;font-size:22px;color:#1E3A2C;\">{{ cd.name }}<\u002Fspan>\n              <span style=\"font-size:13px;font-weight:700;letter-spacing:0.5px;color:#B08A4F;\">{{ cd.checkedLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;\">\n              <sc-for list=\"{{ cd.players }}\" as=\"pl\" hint-placeholder-count=\"8\">\n                <div onclick=\"{{ pl.onToggle }}\" style=\"{{ pl.rowStyle }}\">\n                  <span style=\"{{ pl.boxStyle }}\">{{ pl.check }}<\u002Fspan>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"{{ pl.nameStyle }}\">{{ pl.name }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9A9480;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ pl.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ cd.empty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:14px;color:#9A9480;font-style:italic;padding:8px 2px;\">No players match your search.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SYSTEM CHECKS PANEL ============ -->\n  <sc-if value=\"{{ checksOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:69;\" onclick=\"{{ onToggleChecks }}\"><\u002Fdiv>\n    <div style=\"position:fixed;top:74px;right:24px;z-index:70;width:340px;max-width:calc(100vw - 32px);background:#FBF8F1;border:1px solid #E2D9C4;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,0.28);padding:16px 18px;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;\">\n        <span style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#7A7154;\">System Checks<\u002Fspan>\n        <button onclick=\"{{ onToggleChecks }}\" style=\"border:none;background:transparent;font-size:15px;cursor:pointer;color:#9A9480;line-height:1;\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-for list=\"{{ checks.items }}\" as=\"ck\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-top:1px solid #EFE9DA;\">\n          <span style=\"{{ ck.iconStyle }}\">{{ ck.icon }}<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\">\n            <div style=\"font-size:13px;font-weight:700;color:#26271F;line-height:1.3;\">{{ ck.label }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9A9480;margin-top:2px;line-height:1.35;\">{{ ck.detail }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOURNAMENT MANAGER MODAL ============ -->\n  <sc-if value=\"{{ managerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,20,0.55);display:flex;align-items:center;justify-content:center;z-index:56;\" onclick=\"{{ onToggleManager }}\">\n      <div style=\"background:#FFFFFF;border-radius:18px;width:680px;max-width:92vw;max-height:88vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,0.35);\" onclick=\"{{ stopClick }}\">\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);display:flex;justify-content:space-between;align-items:center;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <img src=\"8451b435-fe1e-4f1d-a8a9-233d13a60b95\" alt=\"Club crest\" style=\"height:36px;width:auto;flex:0 0 auto;\">\n            <div style=\"font-family:'Marcellus',serif;font-size:22px;color:#1E3A2C;\">Manage Tournament<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onToggleManager }}\" style=\"border:none;background:transparent;font-size:18px;cursor:pointer;color:#6B6A5E;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:10px;\">Tournament Details<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <input value=\"{{ data.title }}\" onchange=\"{{ onTitleChange }}\" placeholder=\"Tournament title\" style=\"font-family:'Marcellus',serif;font-size:18px;border:1px solid #D9CDA9;border-radius:8px;padding:10px 12px;color:#1E3A2C;\">\n            <input value=\"{{ data.sub }}\" onchange=\"{{ onSubChange }}\" placeholder=\"Subtitle\" style=\"font-size:13px;border:1px solid #D9CDA9;border-radius:8px;padding:9px 12px;color:#1E3A2C;letter-spacing:0.5px;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:4px;\">Match Format<\u002Fdiv>\n          <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">The scoring format matches are played to. Shown on the presentation board.<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;\">\n            <sc-for list=\"{{ matchFormatPresets }}\" as=\"mf\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ mf.onPick }}\" style=\"{{ mf.style }}\">{{ mf.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <input value=\"{{ matchFormat }}\" onchange=\"{{ onMatchFormatChange }}\" placeholder=\"e.g. 8-game pro set\" style=\"width:100%;font-size:14px;border:1px solid #D9CDA9;border-radius:8px;padding:10px 12px;color:#1E3A2C;box-sizing:border-box;\">\n        <\u002Fdiv>\n\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n          <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Courts Available<\u002Fspan>\n          <button onclick=\"{{ onCourtsDown }}\" style=\"width:28px;height:28px;border-radius:8px;border:1px solid rgba(30,58,44,0.15);background:#F1EFE6;cursor:pointer;font-size:15px;\">–<\u002Fbutton>\n          <span style=\"font-family:'Marcellus',serif;font-size:18px;width:24px;text-align:center;\">{{ courtsCount }}<\u002Fspan>\n          <button onclick=\"{{ onCourtsUp }}\" style=\"width:28px;height:28px;border-radius:8px;border:1px solid rgba(30,58,44,0.15);background:#F1EFE6;cursor:pointer;font-size:15px;\">+<\u002Fbutton>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button onclick=\"{{ onToggleShowSeeds }}\" style=\"{{ showSeedsBtnStyle }}\">{{ showSeedsBtnLabel }}<\u002Fbutton>\n          <button onclick=\"{{ onToggleShuffle }}\" style=\"{{ shuffleBtnStyle }}\">🔀 {{ shuffleBtnLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:0 26px 18px;margin-top:-8px;\">\n          <span style=\"font-size:11px;color:#9A9480;\">{{ shuffleManagerHint }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ anyPods }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:4px;\">Round Robin Scoring<\u002Fdiv>\n          <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">How pod standings are ranked and pod winners determined.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\">\n            <div onclick=\"{{ onRrWins }}\" style=\"{{ rrWinsStyle }}\">\n              <div style=\"font-size:13px;\">Win / Loss Record<\u002Fdiv>\n              <div style=\"font-size:10px;font-weight:500;opacity:0.75;margin-top:2px;\">Most match wins<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ onRrGames }}\" style=\"{{ rrGamesStyle }}\">\n              <div style=\"font-size:13px;\">Total Games Won<\u002Fdiv>\n              <div style=\"font-size:10px;font-weight:500;opacity:0.75;margin-top:2px;\">Games add up across matches<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"padding:20px 26px;display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;\">Divisions<\u002Fdiv>\n          <sc-for list=\"{{ divisionViews }}\" as=\"dv\" hint-placeholder-count=\"2\">\n            <div style=\"border:1px solid #E2D9C4;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;\">\n              <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n                <span style=\"{{ dv.badgeStyle }}\">{{ dv.id }}<\u002Fspan>\n                <input value=\"{{ dv.name }}\" onchange=\"{{ dv.onNameChange }}\" style=\"font-family:'Marcellus',serif;font-size:18px;color:#1E3A2C;background:transparent;border:none;outline:none;flex:1;min-width:120px;\">\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;\">\n                <select value=\"{{ dv.format }}\" onchange=\"{{ dv.onFormatChange }}\" style=\"font-size:13px;font-weight:700;border:1.5px solid #1E3A2C;border-radius:8px;padding:8px 12px;color:#1E3A2C;background:#FBF8F1;\">\n                  <option value=\"compass\" selected=\"{{ dv.isCompass }}\">Compass Draw<\u002Foption>\n                  <option value=\"pods\" selected=\"{{ dv.isPods }}\">Round Robin Pods<\u002Foption>\n                <\u002Fselect>\n                <button onclick=\"{{ dv.onSetup }}\" style=\"font-size:13px;font-weight:700;border:1.5px solid #1E3A2C;background:#1E3A2C;color:#F6F1E3;border-radius:8px;padding:8px 14px;cursor:pointer;\">Edit Draw / Players<\u002Fbutton>\n                <button onclick=\"{{ dv.onReset }}\" style=\"font-size:13px;font-weight:700;border:1.5px solid #C0623C;background:transparent;color:#C0623C;border-radius:8px;padding:8px 14px;cursor:pointer;\">Reset Bracket<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"padding:20px 26px;border-top:1px solid rgba(30,58,44,0.08);\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:4px;\">Backup / Records<\u002Fdiv>\n          <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">Opens a full backup — standings, every score, championship draw, current courts, check-in, and format. Print it or Save as PDF, or download an HTML copy that opens offline. Your safety net if wifi drops or the laptop dies.<\u002Fdiv>\n          <button onclick=\"{{ onPrintReport }}\" style=\"font-size:14px;font-weight:800;letter-spacing:0.3px;border:none;background:#B08A4F;color:#FBF8F1;border-radius:10px;padding:12px 20px;cursor:pointer;\">⬇ Save Backup (PDF / HTML)<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"padding:18px 26px;border-top:1px solid #E2D9C4;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <a href=\"Presentation Display.dc.html\" target=\"_blank\" style=\"font-size:13px;font-weight:700;color:#1E3A2C;text-decoration:underline;\">🖥 Open standalone Presentation Display ↗<\u002Fa>\n          <button onclick=\"{{ onToggleManager }}\" style=\"background:#1E3A2C;color:#F6F1E3;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ RESULTS SUMMARY POPUP ============ -->\n  <sc-if value=\"{{ summaryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,20,0.55);display:flex;align-items:center;justify-content:center;z-index:70;padding:20px;\" onclick=\"{{ onToggleSummary }}\">\n      <div style=\"background:#FBF8F1;border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,0.35);\" onclick=\"{{ stopClick }}\">\n        <div style=\"padding:18px 24px;border-bottom:1px solid #E2D9C4;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#FBF8F1;z-index:2;\">\n          <div style=\"font-family:'Marcellus',serif;font-size:20px;color:#1E3A2C;\">Results Summary<\u002Fdiv>\n          <button onclick=\"{{ onToggleSummary }}\" style=\"border:none;background:transparent;font-size:18px;cursor:pointer;color:#6B6A5E;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 24px 26px;\">\n          <sc-if value=\"{{ summary.hasAny }}\" hint-placeholder-val=\"{{ false }}\">\n            <sc-for list=\"{{ summary.divisions }}\" as=\"sd\" hint-placeholder-count=\"1\">\n              <div style=\"margin-bottom:22px;\">\n                <div style=\"font-family:'Marcellus',serif;font-size:18px;color:#1E3A2C;border-bottom:2px solid #B08A4F;padding-bottom:4px;margin-bottom:10px;\">{{ sd.name }}<\u002Fdiv>\n                <sc-for list=\"{{ sd.pods }}\" as=\"sp\" hint-placeholder-count=\"2\">\n                  <div style=\"margin-bottom:12px;\">\n                    <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:4px;\">{{ sp.letter }}<\u002Fdiv>\n                    <sc-for list=\"{{ sp.rows }}\" as=\"r\" hint-placeholder-count=\"4\">\n                      <div style=\"{{ r.rowStyle }}\">\n                        <span style=\"{{ r.badgeStyle }}\">{{ r.rank }}<\u002Fspan>\n                        <span style=\"flex:1;min-width:0;font-size:14px;font-weight:700;color:#26271F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ r.name }}<\u002Fspan>\n                        <span style=\"flex:0 0 auto;font-size:13px;font-weight:700;color:#1E3A2C;\">{{ r.record }}<\u002Fspan>\n                        <span style=\"flex:0 0 auto;font-size:12px;color:#8A8362;width:34px;text-align:right;\">{{ r.diff }}<\u002Fspan>\n                        <sc-if value=\"{{ r.advanced }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:0 0 auto;font-size:9px;font-weight:800;letter-spacing:1px;color:#B08A4F;\">ADV<\u002Fspan><\u002Fsc-if>\n                      <\u002Fdiv>\n                      <sc-if value=\"{{ r.hasReason }}\" hint-placeholder-val=\"{{ false }}\">\n                        <div style=\"font-size:11px;color:#C0623C;padding:0 10px 4px 42px;font-style:italic;\">tiebreak: {{ r.reason }}<\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <sc-if value=\"{{ sd.hasChamp }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:13px;font-weight:700;color:#1E3A2C;background:#F0EAD8;border-radius:8px;padding:8px 12px;margin-top:4px;\">🏆 {{ sd.champLine }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin:8px 0 8px;\">System Checks<\u002Fdiv>\n            <sc-for list=\"{{ summary.checks }}\" as=\"ck\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:10px;align-items:flex-start;padding:6px 0;\">\n                <span style=\"{{ ck.iconStyle }}\">{{ ck.icon }}<\u002Fspan>\n                <div style=\"flex:1;\"><div style=\"font-size:13px;font-weight:700;color:#26271F;\">{{ ck.label }}<\u002Fdiv><div style=\"font-size:12px;color:#9A9480;\">{{ ck.detail }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ summary.empty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:14px;color:#8A8362;text-align:center;padding:24px 10px;font-style:italic;\">Round robins still in progress — this fills in as each division's pods finish.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TIEBREAK POPUP (rules + how-broken) ============ -->\n  <sc-if value=\"{{ hasTiePopup }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,20,0.55);display:flex;align-items:center;justify-content:center;z-index:70;padding:20px;\" onclick=\"{{ onCloseTiePopup }}\">\n      <div style=\"background:#FBF8F1;border-radius:16px;width:460px;max-width:94vw;max-height:88vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,0.35);\" onclick=\"{{ stopClick }}\">\n        <div style=\"padding:18px 24px;border-bottom:1px solid #E2D9C4;display:flex;justify-content:space-between;align-items:center;\">\n          <div style=\"font-family:'Marcellus',serif;font-size:20px;color:#1E3A2C;\">Tiebreak Rules<\u002Fdiv>\n          <button onclick=\"{{ onCloseTiePopup }}\" style=\"border:none;background:transparent;font-size:18px;cursor:pointer;color:#6B6A5E;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px;\">\n          <sc-if value=\"{{ tiePopup.isTie }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;color:#7A7154;margin-bottom:14px;\">How ties were resolved in Pod {{ tiePopup.podLetter }}:<\u002Fdiv>\n            <sc-for list=\"{{ tiePopup.groups }}\" as=\"g\" hint-placeholder-count=\"1\">\n              <div style=\"margin-bottom:16px;border:1px solid #E9E2CF;border-radius:12px;padding:12px 14px;background:#FFFFFF;\">\n                <div style=\"font-size:12px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:#B08A4F;margin-bottom:8px;\">Tied at {{ g.record }}<\u002Fdiv>\n                <sc-for list=\"{{ g.lines }}\" as=\"ln\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;gap:10px;align-items:baseline;padding:4px 0;\">\n                    <span style=\"flex:0 0 auto;width:18px;font-weight:800;color:#1E3A2C;font-size:14px;\">{{ ln.rank }}<\u002Fspan>\n                    <div style=\"flex:1;\">\n                      <div style=\"font-size:14px;font-weight:700;color:#26271F;\">{{ ln.name }}<\u002Fdiv>\n                      <div style=\"font-size:12px;color:#8A8362;\">{{ ln.detail }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <div style=\"font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#B08A4F;margin-bottom:10px;\">When teams tie on Win–Loss record<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <div style=\"display:flex;gap:10px;\"><span style=\"flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#1E3A2C;color:#F6F1E3;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;\">1<\u002Fspan><span style=\"font-size:13px;color:#26271F;\"><b>Head-to-head<\u002Fb> — record against the other tied teams.<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;\"><span style=\"flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#1E3A2C;color:#F6F1E3;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;\">2<\u002Fspan><span style=\"font-size:13px;color:#26271F;\"><b>Game differential<\u002Fb> — games won minus games lost (the ± number).<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;\"><span style=\"flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#1E3A2C;color:#F6F1E3;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;\">3<\u002Fspan><span style=\"font-size:13px;color:#26271F;\"><b>Total games won.<\u002Fb><\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;\"><span style=\"flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#1E3A2C;color:#F6F1E3;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;\">4<\u002Fspan><span style=\"font-size:13px;color:#26271F;\"><b>Fewest games lost.<\u002Fb><\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;\"><span style=\"flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:#C0623C;color:#F6F1E3;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;\">5<\u002Fspan><span style=\"font-size:13px;color:#26271F;\"><b>3-point playoff<\u002Fb> — if still dead even, tied teams play a 3-point playoff to decide.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11px;color:#9A9480;margin-top:16px;font-style:italic;\">The system applies these automatically, top to bottom, stopping at the first one that separates the teams.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TV CHAMPION SPOTLIGHT OVERLAY ============ -->\n  <sc-if value=\"{{ spotlightDiv }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:radial-gradient(circle at center, #234A38 0%, #142A1F 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;\" onclick=\"{{ onCloseSpotlight }}\">\n      <div style=\"font-size:13px;letter-spacing:6px;text-transform:uppercase;color:#C9A96A;margin-bottom:18px;\">{{ spotlightDivName }} Champions<\u002Fdiv>\n      <div style=\"font-family:'Marcellus',serif;font-size:76px;color:#F6F1E3;text-align:center;line-height:1.1;text-shadow:0 4px 30px rgba(0,0,0,0.4);\">{{ spotlightName }}<\u002Fdiv>\n      <div style=\"margin-top:26px;width:64px;height:3px;background:#B08A4F;\"><\u002Fdiv>\n      <div style=\"margin-top:22px;font-size:13px;color:#C9A96A;letter-spacing:1px;\">Click anywhere to return<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst SURN_A = ['Whitaker','Ellison','Marchetti','Delacroix','Hargrove','Sinclair','Abernathy','Kingsley','Fontaine','Beaumont','Prescott','Ashford','Lockwood','Rutherford','Carrington','Vandenberg'];\nconst SURN_B = ['Cole','Nguyen','Ibarra','Rossi','Okafor','Bianchi','Mendez','Park','Larsen','Haddad','Serrano','Volkov','Reyes','Kaur','Novak','Faber'];\nconst STORE_KEY = 'tbm_state_v1';\nconst ROTATE_MS = 12000; // display auto-rotate interval between divisions\n\n// ===== Live sync (Supabase) =====\nconst SUPABASE_URL = 'https://yvisuaocnzzplrscvlkx.supabase.co';\nconst SUPABASE_KEY = 'sb_publishable_NgJaxs9OLbC2MTmuI-5Mlg_Ppk6yWGj';\nconst TOURNEY_CODE = '1890';\n// only the tournament DATA syncs across devices — per-device view state (which screen\n// you're looking at, open modals, presentation toggle) stays local to each device.\nconst SHARED_KEYS = ['title','sub','courts','courtBoard','queue','assignedAt','divisions','history','checkin','courtOrder','matchFormat','playedOn','briefing'];\nfunction pickShared(s){ const o = {}; SHARED_KEYS.forEach(k => { if(s[k] !== undefined) o[k] = s[k]; }); return o; }\n\nfunction pow2(n){ let p=1; while(p<n) p*=2; return p; }\n// round-robin schedule for a 4-team pod (circle method): 3 rounds, 2 simultaneous matches each\nconst POD_SCHEDULE = [ [[0,3],[1,2]], [[0,2],[3,1]], [[0,1],[2,3]] ];\nfunction seedPositions(np){\n  let a=[1];\n  while(a.length<np){\n    const m=a.length*2+1; const b=[];\n    for(const s of a){ b.push(s); b.push(m-s); }\n    a=b;\n  }\n  return a;\n}\nfunction shuffleArr(arr){\n  const a = arr.slice();\n  for(let i=a.length-1;i>0;i--){\n    const j = Math.floor(Math.random()*(i+1));\n    const t = a[i]; a[i]=a[j]; a[j]=t;\n  }\n  return a;\n}\nfunction roundLabel(r, R){\n  const d = R-1-r;\n  if(d===0) return 'Final';\n  if(d===1) return 'Semifinals';\n  if(d===2) return 'Quarterfinals';\n  if(d===3) return 'Round of 16';\n  if(d===4) return 'Round of 32';\n  return 'Round ' + (r+1);\n}\n\n// pure bracket compute — teams in seed order, results namespaced by prefix (e.g. 'E-','W-','' )\nfunction computeBracket(teams, resultsAll, prefix){\n  const N = teams.length;\n  const np = pow2(Math.max(2,N));\n  const R = Math.log2(np);\n  const order = seedPositions(np);\n  const teamBySeed = (s) => (s <= N ? teams[s-1] : null);\n\n  const rounds = [];\n  const r0 = [];\n  for(let m=0;m<np/2;m++) r0.push([teamBySeed(order[2*m]), teamBySeed(order[2*m+1])]);\n  rounds.push(r0.map(pair => ({ slots: pair })));\n\n  const winnerOf = (r, i, slots) => {\n    const res = resultsAll[prefix+r+'-'+i];\n    if(res && res.winner != null) return slots[res.winner];\n    if(slots[0] && !slots[1]) return slots[0];\n    if(slots[1] && !slots[0]) return slots[1];\n    return null;\n  };\n  const loserOf = (r, i, slots) => {\n    const res = resultsAll[prefix+r+'-'+i];\n    if(!slots[0] || !slots[1]) return null;\n    if(!res || res.winner == null) return null;\n    return slots[res.winner === 0 ? 1 : 0];\n  };\n\n  for(let r=1;r<R;r++){\n    const prev = rounds[r-1];\n    const cnt = prev.length/2;\n    const arr = [];\n    for(let i=0;i<cnt;i++){\n      const w0 = winnerOf(r-1, 2*i, prev[2*i].slots);\n      const w1 = winnerOf(r-1, 2*i+1, prev[2*i+1].slots);\n      arr.push({ slots:[w0,w1] });\n    }\n    rounds.push(arr);\n  }\n\n  let champion = null;\n  const finalWinner = winnerOf(R-1, 0, rounds[R-1][0].slots);\n  if(finalWinner) champion = finalWinner;\n\n  return { rounds, R, np, winnerOf, loserOf, champion, prefix };\n}\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.isViewer = (typeof location !== 'undefined') && new URLSearchParams(location.search).has('view');\n    this.state = this.loadState() || this.seedState();\n    if(!this.state.courtBoard) this.state.courtBoard = {};\n    if(!this.state.queue) this.state.queue = [];\n    if(!this.state.briefing || !this.state.briefing.items || !this.state.briefing.items.length){\n      this.state.briefing = { items: [\n        { id:'b1', text:'Welcome & thanks for coming', done:false },\n        { id:'b2', text:'Format overview', done:false },\n        { id:'b3', text:'Tiebreaker rules', done:false },\n        { id:'b4', text:'Court assignments & rotation', done:false },\n        { id:'b5', text:'Check-in confirmation', done:false },\n        { id:'b6', text:'Schedule / order of play', done:false },\n        { id:'b7', text:'Sportsmanship & etiquette', done:false },\n        { id:'b8', text:'Questions', done:false }\n      ] };\n    }\n    this.state.syncStatus = 'connecting';\n  }\n\n  mkTeams(size){\n    const t = [];\n    for(let i=0;i<size;i++) t.push({ id:'t'+i, p1: SURN_A[i % SURN_A.length], p2: SURN_B[i % SURN_B.length] });\n    return t;\n  }\n\n  mkDivision(id, name, size){\n    return { id, name, format:'compass', size, teams: this.mkTeams(size), results: {}, advanceCount: 2 };\n  }\n\n  seedState(){\n    return {\n      title: 'Tennis Club Championship',\n      sub: 'Summer Invitational · 2026',\n      tv: false,\n      tvLayout: 'single',\n      tvTheme: 'dark',\n      rotate: false,\n      focus: 'A',\n      spotlightDismissed: {},\n      courts: 4,\n      courtBoard: {},\n      queue: [],\n      assignedAt: {},\n      checkin: {},\n      courtOrder: {},\n      matchFormat: '8-game pro set',\n      playedOn: {},\n      briefing: { items: [\n        { id:'b1', text:'Welcome & thanks for coming', done:false },\n        { id:'b2', text:'Format overview', done:false },\n        { id:'b3', text:'Tiebreaker rules', done:false },\n        { id:'b4', text:'Court assignments & rotation', done:false },\n        { id:'b5', text:'Check-in confirmation', done:false },\n        { id:'b6', text:'Schedule / order of play', done:false },\n        { id:'b7', text:'Sportsmanship & etiquette', done:false },\n        { id:'b8', text:'Questions', done:false }\n      ] },\n      plannerOpen: false,\n      consoleOpen: false,\n      consoleRound: 0,\n      scorePad: null,\n      history: [],\n      divisions: { A: this.mkDivision('A','A Division', 8), B: this.mkDivision('B','B Division', 8) },\n      setupOpen: null\n    };\n  }\n\n  loadState(){\n    try {\n      const raw = localStorage.getItem(STORE_KEY);\n      if(!raw) return null;\n      const s = JSON.parse(raw);\n      if(!s || !s.divisions) return null;\n      return s;\n    } catch(e){ return null; }\n  }\n\n  save(){\n    try { localStorage.setItem(STORE_KEY, JSON.stringify(this.state)); } catch(e){}\n    this.cloudPush();\n  }\n\n  // ===== Live sync =====\n  initSync(){\n    if(!(window.supabase && window.supabase.createClient)){\n      // library not ready yet — retry shortly\n      this._syncRetry = setTimeout(() => this.initSync(), 400);\n      return;\n    }\n    try {\n      this._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { realtime: { params: { eventsPerSecond: 5 } } });\n    } catch(e){ this.setState({ syncStatus:'offline' }); return; }\n\n    // 1. pull the current shared state on load\n    this._sb.from('tournaments').select('state').eq('code', TOURNEY_CODE).maybeSingle()\n      .then(({ data, error }) => {\n        if(error){ this.setState({ syncStatus:'offline' }); return; }\n        if(data && data.state){\n          this._lastRemote = JSON.stringify(data.state);\n          this.setState({ ...pickShared(data.state), syncStatus:'live' }, () => this.autoAssign());\n        } else {\n          this.setState({ syncStatus:'live' });\n          if(!this.isViewer) this.cloudPush(true); // editor seeds the record if empty\n        }\n      });\n\n    // 2. Only VIEW-ONLY devices listen for changes. The scoring device is the single\n    //    source of truth — if it reacted to its own server echoes it would fight itself\n    //    (courts/presentation flicker on every score). So editors only send, never apply.\n    if(this.isViewer){\n      this._chan = this._sb.channel('tourney-' + TOURNEY_CODE)\n        .on('postgres_changes', { event:'*', schema:'public', table:'tournaments', filter:'code=eq.'+TOURNEY_CODE },\n          (payload) => {\n            const remote = payload.new && payload.new.state;\n            if(!remote) return;\n            const rs = JSON.stringify(remote);\n            if(rs === this._lastRemote) return;\n            this._lastRemote = rs;\n            this.setState({ ...pickShared(remote) }, () => this.autoAssign());\n          })\n        .subscribe((status) => {\n          if(status === 'SUBSCRIBED') this.setState({ syncStatus:'live' });\n        });\n    }\n  }\n\n  cloudPush(immediate){\n    if(this.isViewer || !this._sb) return;         // viewers never write\n    clearTimeout(this._pushTimer);\n    const doPush = () => {\n      const shared = pickShared(this.state);\n      const json = JSON.stringify(shared);\n      this._lastRemote = json; ,i,m.slots) : null); }\n    const builtW = computeBracket(teamsW, div.results, 'W-');\n\n    const sizeN = Math.max(2, Math.floor(div.size/4));\n    const teamsN = [];\n    for(let i=0;i<sizeN;i++){ const rd = builtE.rounds[1]; const m = rd && rd[i]; teamsN.push(m ? builtE.loserOf(1,i,m.slots) : null); }\n    const builtN = computeBracket(teamsN, div.results, 'N-');\n\n    const sizeS = sizeN;\n    const teamsS = [];\n    for(let i=0;i<sizeS;i++){ const m = builtW.rounds[0][i]; teamsS.push(m ? builtW.loserOf(0,i,m.slots) : null); }\n    const builtS = computeBracket(teamsS, div.results, 'S-');\n\n    return { E: builtE, W: builtW, N: builtN, S: builtS };\n  }\n\n  // ---- double elimination: winners bracket + losers bracket + single grand final ----\n  buildDoubleLosers(builtW, div, prefixL){\n    const n = builtW.R;\n    const results = div.results;\n    const lbRounds = [];\n    const roundWinners = (roundMatches, r) => roundMatches.map((m,i) => {\n      const res = results[prefixL+r+'-'+i];\n      if(res && res.winner != null) return m.slots[res.winner];\n      if(m.slots[0] && !m.slots[1]) return m.slots[0];\n      if(m.slots[1] && !m.slots[0]) return m.slots[1];\n      return null;\n    });\n    const pushRound = (pairs) => {\n      const r = lbRounds.length;\n      const matches = pairs.map(slots => ({ slots }));\n      lbRounds.push(matches);\n      return roundWinners(matches, r);\n    };\n    const wLosers = (wr) => builtW.rounds[wr].map((m,i) => builtW.loserOf(wr,i,m.slots));\n\n    const pool = wLosers(0);\n    let pairs = [];\n    for(let i=0;i<pool.length/2;i++) pairs.push([pool[2*i], pool[2*i+1]]);\n    let currentWinners = pushRound(pairs);\n\n    for(let wr=1; wr<n; wr++){\n      const incoming = wLosers(wr);\n      const acrossPairs = currentWinners.map((t,i) => [t, incoming[i]]);\n      currentWinners = pushRound(acrossPairs);\n      if(wr < n-1){\n        const cPairs = [];\n        for(let i=0;i<currentWinners.length/2;i++) cPairs.push([currentWinners[2*i], currentWinners[2*i+1]]);\n        currentWinners = pushRound(cPairs);\n      }\n    }\n    const champion = currentWinners[0] || null;\n    return {\n      rounds: lbRounds, R: lbRounds.length, champion,\n      loserOf: (r,i,slots) => {\n        const res = results[prefixL+r+'-'+i];\n        if(!slots[0] || !slots[1]) return null;\n        if(!res || res.winner == null) return null;\n        return slots[res.winner === 0 ? 1 : 0];\n      }\n    };\n  }\n\n  buildDouble(div){\n    const builtW = computeBracket(div.teams, div.results, 'DW-');\n    const builtL = this.buildDoubleLosers(builtW, div, 'DL-');\n    const gfSlots = [builtW.champion, builtL.champion];\n    const res = div.results['DF-0-0'];\n    let winner = null;\n    if(gfSlots[0] && gfSlots[1] && res && res.winner != null) winner = gfSlots[res.winner];\n    const builtGF = { rounds: [[{ slots: gfSlots }]], R: 1, champion: winner };\n    return { W: builtW, L: builtL, GF: builtGF };\n  }\n\n  // ---- round-robin pods: 2 pods of 4 (snake-seeded), crosstable scoring, pod winners meet in a final ----\n  buildPods(div){\n    const results = div.results;\n    const seeded = div.teams.map((t,idx) => ({ team:t, seed:idx+1 }));\n    const podArr = [[],[]];\n    seeded.forEach((s, idx) => { const block = Math.floor(idx/2), within = idx%2; const p = (block%2===0) ? within : (1-within); podArr[p].push(s); });\n\n    const buildPod = (p) => {\n      const members = podArr[p];\n      const n = members.length;\n      const stat = members.map(() => ({ w:0, l:0, gf:0, ga:0, played:0 }));\n      for(let i=0;i<n;i++) for(let j=0;j<n;j++){\n        if(i===j) continue;\n        const my = results['RR-'+p+'-'+i+'-'+j], opp = results['RR-'+p+'-'+j+'-'+i];\n        if(my!=null && my!=='' && opp!=null && opp!==''){\n          const a=+my, b=+opp; stat[i].gf+=a; stat[i].ga+=b; stat[i].played++;\n          if(a>b) stat[i].w++; else if(a<b) stat[i].l++;\n        }\n      }\n      let done=0, total=0;\n      for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){ total++; const a=results['RR-'+p+'-'+i+'-'+j], b=results['RR-'+p+'-'+j+'-'+i]; if(a!=null&&a!==''&&b!=null&&b!=='') done++; }\n      const complete = total>0 && done===total;\n      const order = members.map((m,i) => ({ ...m, i, ...stat[i], diff: stat[i].gf-stat[i].ga }));\n      const rrMode = div.rrScoring === 'games' ? 'games' : 'wins';\n      let tieGroups = [];        // resolved ties, for the \"how it was broken\" popup\n      let pendingPlayoffs = [];  // dead-even groups awaiting a 3-point playoff\n      if(rrMode === 'games'){\n        order.sort((x,y) => (y.gf-x.gf) || (y.w-x.w) || (y.diff-x.diff));\n      } else {\n        const tb = div.tiebreaks || {};\n        // head-to-head wins for team index ti, counting only matches vs the given group of member indices\n        const h2hWins = (ti, groupIdxs) => {\n          let w = 0;\n          groupIdxs.forEach(j => { if(j===ti) return;\n            const my=results['RR-'+p+'-'+ti+'-'+j], opp=results['RR-'+p+'-'+j+'-'+ti];\n            if(my!=null&&my!==''&&opp!=null&&opp!==''){ if(+my>+opp) w++; }\n          });\n          return w;\n        };\n        const steps = [\n          { id:'h2h',  label:'head-to-head',       val:(t,grp)=>h2hWins(t.i, grp.map(g=>g.i)) },\n          { id:'diff', label:'game differential',  val:(t)=>t.diff },\n          { id:'gf',   label:'total games won',     val:(t)=>t.gf },\n          { id:'ga',   label:'fewest games lost',   val:(t)=>-t.ga },\n        ];\n        const groupKeyOf = (grp) => 'TB-'+p+'-'+grp.map(g=>g.i).slice().sort((a,b)=>a-b).join('_');\n        const resolve = (grp, stepIdx) => {\n          if(grp.length<=1) return grp;\n          if(stepIdx>=steps.length){\n            const gk = groupKeyOf(grp);\n            const stored = tb[gk];\n            if(stored && stored.length){\n              const byI={}; grp.forEach(g=>byI[g.i]=g);\n              const ordered = stored.filter(i=>byI[i]!=null).map(i=>{ byI[i].tbReason='3-point playof utoAssign(); });\n  }\n\n  renderPodsBoard(div, tv){\n    const raw = this.buildPods(div);\n    const adv = raw.adv;\n    const showSeeds = this.state.showSeeds !== false;\n    const letterOf = (li) => String.fromCharCode(65+li);\n    const dark = tv && (this.state.tvTheme !== 'light');\n    const base = dark ? '#F3F1E8' : '#26271F';\n    const muted = dark ? 'rgba(243,241,232,0.5)' : '#8A8362';\n    const cardBg = dark ? 'rgba(255,255,255,0.05)' : '#FFFFFF';\n    const gold = dark ? '#C9A96A' : '#B08A4F';\n    const RG = 1.2; // round-robin crosstable scale (20% larger)\n    const cellW = Math.round((tv?56:40)*RG), labelColW = Math.round((tv?54:40)*RG), cellH = Math.round((tv?42:30)*RG), headH = Math.round((tv?26:20)*RG);\n    const border = dark ? '1px solid rgba(255,255,255,0.12)' : '1px solid rgba(30,58,44,0.10)';\n\n    const rrMode = div.rrScoring === 'games' ? 'games' : 'wins';\n    const totalW = Math.round((tv ? 58 : 46)*RG);\n    const mkPod = (p) => {\n      const pod = p===0 ? raw.pod0 : raw.pod1;\n      const letter = p===0 ? 'A' : 'B';\n      const n = pod.n;\n      const headers = pod.members.map((m,ci) => ({ label: showSeeds?String(m.seed):letterOf(ci), style:{ width:cellW+'px', height:headH+'px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:Math.round((tv?13:11)*RG)+'px', fontWeight:800, color:muted } }));\n      const totalsHeader = { label: rrMode==='games' ? 'GAMES' : 'W–L', style:{ width:totalW+'px', height:headH+'px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:Math.round((tv?11:9)*RG)+'px', fontWeight:800, letterSpacing:'0.5px', color:gold } };\n      const rows = pod.members.map((m,i) => {\n        const st = pod.stat[i];\n        const cells = pod.members.map((mj,j) => {\n          if(i===j) return { textOnly:true, hasInput:false, display:'\\u2013', tdStyle:{ width:cellW+'px', height:cellH+'px', display:'flex', alignItems:'center', justifyContent:'center', background: dark?'rgba(255,255,25 tate({ consoleOpen:true }); }\n\n  // Live court rearrange: drag one occupied court onto another to SWAP their matches.\n  // Writes straight to the shared courtBoard, so the TV/presentation view and every\n  // other court display update at once. Pointer Events → works on iPad touch too.\n  startLiveDrag(e, court){\n    if(e && e.cancelable) e.preventDefault();\n    if(e && e.stopPropagation) e.stopPropagation();\n    this.setState({ liveDrag: court, liveDragOver: null });\n    const overCourt = (ev) => {\n      const t = document.elementFromPoint(ev.clientX, ev.clientY);\n      const card = t && t.closest && t.closest('[data-court]');\n      const n = card ? Number(card.getAttribute('data-court')) : null;\n      return (n && (this.state.courtBoard||{})[n]) ? n : null; // only occupied courts are valid drop targets\n    };\n    this._liveMove = (ev) => {\n      const over = overCourt(ev);\n      if(over !== this.state.liveDragOver) this.setState({ liveDragOver: over });\n    };\n    this._liveUp = (ev) => {\n      const over = overCourt(ev);\n      if(over && over !== court) this.swapLiveCourts(court, over);\n      window.removeEventListener('pointermove', this._liveMove);\n      window.removeEventListener('pointerup', this._liveUp);\n      this.setState({ liveDrag: null, liveDragOver: null });\n    };\n    window.addEventListener('pointermove', this._liveMove);\n    window.addEventListener('pointerup', this._liveUp);\n  }\n  swapLiveCourts(a, b){\n    if(a === b) return;\n    this.setState(s => {\n      const cb = { ...(s.courtBoard||{}) };\n      const ka = cb[a], kb = cb[b];\n      if(!ka || !kb) return {}; // both must be occupied (swap only)\n      cb[a] = kb; cb[b] = ka;\n      const assignedAt = { ...(s.assignedAt||{}) }; // keep each match's elapsed timer with the match\n      return { courtBoard: cb, assignedAt };\n    }, () => this.save());\n  }\n\n  // Rounds-list drag: drag one on-court match onto another to swap their courts.\n  startRowDrag(e, assignKey, court){\n    if(e && e.cancelable) e.preventDefault();\n    if(e && e.stopPropagation) e.stopPropagation();\n    this.setState({ rowDrag: assignKey, rowDragOver: null });\n    const overKey = (ev) => {\n      const t = document.elementFromPoint(ev.clientX, ev.clientY);\n      const row = t && t.closest && t.closest('[data-akey]');\n      const ak = row ? row.getAttribute('data-akey') : null;\n      return (ak && (this.courtOfKey(ak) != null)) ? ak : null; // only on-court matches are valid drop targets\n    };\n    this._rowMove = (ev) => {\n      const over = overKey(ev);\n      if(over !== this.state.rowDragOver) this.setState({ rowDragOver: over });\n    };\n    this._rowUp = (ev) => {\n      const over = overKey(ev);\n      if(over && over !== assignKey){\n        const cb = this.state.courtBoard || {};\n        let ca = null, cbb = null;\n        Object.keys(cb).forEach(c => { if(cb[c] === assignKey) ca = Number(c); if(cb[c] === over) cbb = Number(c); });\n        if(ca != null && cbb != null) this.swapLiveCourts(ca, cbb);\n      }\n      window.removeEventListener('pointermove', this._rowMove);\n      window.removeEventListener('pointerup', this._rowUp);\n      this.setState({ rowDrag: null, rowDragOver: null });\n    };\n    window.addEventListener('pointermove', this._rowMove);\n    window.addEventListener('pointerup', this._rowUp);\n  }\n  courtOfKey(assignKey){\n    const cb = this.state.courtBoard || {};\n    for(const c of Object.keys(cb)){ if(cb[c] === assignKey) return Number(c); }\n    return null;\n  }\n  closeConsole(){ this.setState({ consoleOpen:false, scorePad:null }); }\n  setConsoleRound(n){ this.setState({ consoleRound:n }); }\n\n  // resolve an assignKey's match to team names + current scores + scoring params\n  resolveMatch(divId, matchKey){\n    const div = this.state.divisions[divId];\n    const results = div.results;\n    if(matchKey.indexOf('RRM-')===0){\n      const seg = matchKey.split('-'); const p=+seg[1], i=+seg[2], j=+seg[3];\n      const raw = this.buildPods(div); const pod = p===0?raw.pod0:raw.pod1;\n      const ti=pod.members[i], tj=pod.members[j];\n      const a=results['RR-'+p+'-'+i+'-'+j], b=results['RR-'+p+'-'+j+'-'+i];\n      return { aName:ti.team.p1+' / '+ti.team.p2, bName:tj.team.p1+' / '+tj.team.p2, a:a!=null?a:'', b:b!=null?b:'', kind:'rrm', p, i, j };\n    }\n    if(matchKey.indexOf('RRP-')===0){\n      const seg = matchKey.split('-'); const r=+seg[1], i=+seg[2];\n      const raw = this.buildPods(div); const pl=raw.playoff; const m=pl?pl.rounds[r][i]:null;\n      const s0=m&&m.slots[0], s1=m&&m.slots[1];\n      const res=results['RRP-'+r+'-'+i]||{}; const sc=res.scores||['',''];\n      return { aName:s0?s0.p1+' / '+s0.p2:'TBD', bName:s1?s1.p1+' / '+s1.p2:'TBD', a:sc[0]!=null?sc[0]:'', b:sc[1]!=null?sc[1]:'', kind:'rrp', r, i };\n    }\n    const seg = matchKey.split('-'); const i=+seg.pop(); const r=+seg.pop(); const prefix = seg.length?seg.join('-')+'-':'';\n    let built;\n    if(div.format==='compass'){ const c=this.buildCompass(div); built = prefix==='E-'?c.E:prefix==='W-'?c.W:prefix==='N-'?c.N:c.S; }\n    else if(div.format==='double'){ const d=this.buildDouble(div); built = prefix==='DW-'?d.W:prefix==='DL-'?d.L:d.GF; }\n    else { built = computeBracket(div.teams, results, ''); }\n    const m = built.rounds[r] && built.rounds[r][i]; const s0=m&&m.slots[0], s1=m&&m.slots[1];\n    const res=results[matchKey]||{}; const sc=res.scores||['',''];\n    return { aName:s0?s0.p1+' / '+s0.p2:'TBD', bName:s1?s1.p1+' / '+s1.p2:'TBD', a:sc[0]!=null?sc[0]:'', b:sc[1]!=null?sc[1]:'', kind:'bracket', prefix, r, i, R:built.R };\n  }\n\n  openScorePad(assignKey){\n    const idx = assignKey.indexOf('|'); const divId = assignKey.slice(0,idx), mk = assignKey.slice(idx+1);\n    const info = this.resolveMatch(divId, mk);\n    this.setState({ scorePad: { assignKey, divId, matchKey: mk, active:'a', ...info, a: info.a!=null?String(info.a):'', b: info.b!=null?String(info.b):'', hasExisting: (info =='' || pad.b==='') return;\n    const a=+pad.a, b=+pad.b, divId=pad.divId, assignKey=pad.assignKey;\n    if(!pad._confirmed){\n      const chk = this.formatCheck(a, b);\n      if(!chk.ok){ this.setState({ scorePad: { ...pad, warn: chk.expected } }); return; }\n    }\n    this.setState(s => {\n      const history = [ ...(s.history||[]), {\n        divisions: JSON.parse(JSON.stringify(s.divisions)),\n        courtBoard: { ...s.courtBoard }, queue: [ ...(s.queue||[]) ], assignedAt: { ...(s.assignedAt||{}) },\n        label: pad.aName+' '+a+'\\u2013'+b+' '+pad.bName\n      } ].slice(-30);\n      const d = { ...s.divisions[divId] }; const results = { ...d.results };\n      if(pad.kind==='rrm'){\n        results['RR-'+pad.p+'-'+pad.i+'-'+pad.j] = String(a);\n        results['RR-'+pad.p+'-'+pad.j+'-'+pad.i] = String(b);\n        Object.keys(results).forEach(k => { if(k.indexOf('RRP-')===0) delete results[k]; });\n      } else if(pad.kind==='rrp'){\n        const cur = results['RRP-'+pad.r+'-'+pad.i]||{};\n        const winner = a>b?0:(b>a?1:cur.winner);\n        results['RRP-'+pad.r+'-'+pad.i] = { ...cur, scores:[String(a),String(b)], winner };\n      } else {\n        const key = pad.matchKey; const cur = results[key]||{};\n        const winner = a>b?0:(b>a?1:cur.winner);\n        results[key] = { ...cur, scores:[String(a),String(b)], winner };\n        let j=pad.i; const R=pad.R||8;\n        for(let rr=pad.r+1; rr<R; rr++){ j=Math.floor(j/2); delete results[pad.prefix+rr+'-'+j]; }\n        if(pad.prefix==='E-'){ Object.keys(results).forEach(k=>{ if(k.indexOf('W-')===0||k.indexOf('N-')===0||k.indexOf('S-')===0) delete results[k]; }); }\n        else if(pad.prefix==='W-'){ Object.keys(results).forEach(k=>{ if(k.indexOf('S-')===0) delete results[k]; }); }\n        else if(pad.prefix==='DW-'){ Object.keys(results).forEach(k=>{ if(k.indexOf('DL-')===0||k.indexOf('DF-')===0) delete results[k]; }); }\n        else if(pad.prefix==='DL-'){ Object.keys(results).forEach(k=>{ if(k.indexOf('DF-')===0) delete results[k]; }); }\n      }\n      d.results = results;\n      const divisions = { ...s.divisions, [divId]: d };\n      const courtBoard = { ...s.courtBoard };\n      const playedOn = { ...(s.playedOn||{}) };\n      Object.keys(courtBoard).forEach(c => { if(courtBoard[c]===assignKey){ playedOn[assignKey] = Number(c); courtBoard[c]=null; } });\n      const queue = (s.queue||[]).filter(k => k!==assignKey);\n      const assignedAt = { ...(s.assignedAt||{}) }; delete assignedAt[assignKey];\n      return { divisions, courtBoard, queue, assignedAt, history, playedOn, scorePad:null };\n    }, () => { this.save(); this.autoAssign(); });\n  }\n\n  // Revert a match back to unplayed — clears its score everywhere. Undoable via the console Undo.\n  clearResult(){\n    const pad = this.state.scorePad; if(!pad) return;\n    const divId = pad.divId;\n    this.setState(s => {\n      const history = [ ...(s.history||[]), {\n        divisions: JSON.parse(JSON.stringify(s.divisions)),\n        courtBoard: { ...s.courtBoard }, queue: [ ...(s.queue||[]) ], assignedAt: { ...(s.assignedAt||{}) },\n        label: 'Cleared '+pad.aName+' vs '+pad.bName\n      } ].slice(-30);\n      const d = { ...s.divisions[divId] }; const results = { ...d.results };\n      if(pad.kind==='rrm'){\n        delete results['RR-'+pad.p+'-'+pad.i+'-'+pad.j];\n        delete results['RR-'+pad.p+'-'+pad.j+'-'+pad.i];\n        Object.keys(results).forEach(k => { if(k.indexOf('RRP-')===0) delete results[k]; });\n      } else if(pad.kind==='rrp'){\n        delete results['RRP-'+pad.r+'-'+pad.i];\n      } else {\n        const key = pad.matchKey; delete results[key];\n        let j=pad.i; const R=pad.R||8;\n        for(let rr=pad.r+1; rr<R; rr++){ j=Math.floor(j/2); delete results[pad.prefix+rr+'-'+j]; }\n      }\n      d.results = results;\n      const playedOn = { ...(s.playedOn||{}) }; delete playedOn[pad.assignKey];\n      return { divisions: { ...s.divisions, [divId]: d }, history, played
