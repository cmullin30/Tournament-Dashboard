document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"f7da529a-bc0b-41e1-94b6-46810d9efa8b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Marcellus';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"c4e3e28f-c58c-4750-8cc7-e65652fda034\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Marcellus';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f41714b9-a6b8-40db-ae05-df83a1c57371\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"41a56131-be84-4dea-bc0e-32f3995d6e84\"><\u002Fscript>\n  <style>\n    @keyframes livePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,98,60,0.45), 0 6px 16px rgba(30,58,44,0.10); } 50% { box-shadow: 0 0 0 7px rgba(192,98,60,0), 0 6px 16px rgba(30,58,44,0.10); } }\n    @keyframes riseIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }\n    @keyframes confettiFall { 0% { transform:translateY(-10px) rotate(0deg); opacity:1;} 100% { transform:translateY(420px) rotate(360deg); opacity:0;} }\n    * { box-sizing: border-box; }\n    body { margin:0; font-family:'Archivo',sans-serif; }\n    ::-webkit-scrollbar { height:10px; width:10px; }\n    ::-webkit-scrollbar-thumb { background:#D9CDA9; border-radius:6px; }\n    ::-webkit-scrollbar-track { background:transparent; }\n    input { font-family:'Archivo',sans-serif; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ rootStyle }}\">\n\n  <!-- ============ HEADER (editor) ============ -->\n  <sc-if value=\"{{ editorMode }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:linear-gradient(135deg,#20402F 0%,#1A3226 100%);border-bottom:2px solid #B08A4F;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;\">\n      <input value=\"{{ data.title }}\" size=\"{{ titleSize }}\" onchange=\"{{ onTitleChange }}\" style=\"font-family:'Marcellus',serif;font-size:30px;line-height:1.3;letter-spacing:0.5px;color:#F6F1E3;background:transparent;border:none;outline:none;padding:2px 4px;max-width:100%;\">\n      <input value=\"{{ data.sub }}\" size=\"{{ subSize }}\" onchange=\"{{ onSubChange }}\" style=\"font-family:'Archivo',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#C9A96A;background:transparent;border:none;outline:none;padding:2px 4px;max-width:100%;\">\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(201,169,106,0.35);border-radius:999px;padding:6px 8px 6px 14px;\">\n        <span style=\"{{ liveDotStyle }}\"><\u002Fspan>\n        <span style=\"color:#EFE7D2;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;\">{{ liveLabel }}<\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ onTogglePlanner }}\" style=\"{{ plannerBtnStyle }}\">▤ Planner<\u002Fbutton>\n      <button onclick=\"{{ onOpenConsole }}\" style=\"font-size:12px;font-weight:800;letter-spacing:0.5px;border-radius:999px;padding:8px 16px;cursor:pointer;border:1px solid #C0623C;background:#C0623C;color:#FBF8F1;white-space:nowrap;\">● Live Console<\u002Fbutton>\n      <button onclick=\"{{ onToggleSchedule }}\" style=\"{{ scheduleBtnStyle }}\">🗓 Order of Play<\u002Fbutton>\n      <button onclick=\"{{ onToggleManager }}\" style=\"{{ managerBtnStyle }}\">⚙ Manage Tournament<\u002Fbutton>\n      <button onclick=\"{{ onToggleRotate }}\" style=\"{{ rotateBtnStyle }}\">{{ rotateBtnLabel }}<\u002Fbutton>\n      <button onclick=\"{{ onToggleTv }}\" style=\"{{ tvBtnStyle }}\">{{ tvBtnLabel }}<\u002Fbutton>\n      <a href=\"?view=1\" target=\"_blank\" style=\"text-decoration:none;font-size:12px;font-weight:700;letter-spacing:0.5px;border-radius:999px;padding:8px 16px;cursor:pointer;border:1px solid #B08A4F;background:transparent;color:#C9A96A;white-space:nowrap;\">🖥 Open Presentation Display ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ HEADER (presentation) ============ -->\n  <sc-if value=\"{{ tvMode }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 44px 6px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;\">\n    <div>\n      <div style=\"font-family:'Marcellus',serif;font-size:34px;letter-spacing:0.5px;color:#F6F1E3;\">{{ data.title }}<\u002Fdiv>\n      <div style=\"font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#C9A96A;margin-top:6px;\">{{ data.sub }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n      <div style=\"display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:999px;padding:3px;\">\n        <div onclick=\"{{ onSetLayoutSingle }}\" style=\"{{ layoutSingleStyle }}\">Single<\u002Fdiv>\n        <div onclick=\"{{ onSetLayoutSide }}\" style=\"{{ layoutSideStyle }}\">Side by Side<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ tvLayoutSingle }}\" hint-placeholder-val=\"{{ true }}\">\n        <sc-for list=\"{{ tvTabs }}\" as=\"tb\" hint-placeholder-count=\"2\">\n          <div onclick=\"{{ tb.onClick }}\" style=\"{{ tb.style }}\">{{ tb.label }}<\u002Fdiv>\n        <\u002Fsc-for>\n        <button onclick=\"{{ onToggleRotate }}\" style=\"{{ rotateBtnStyle }}\">{{ rotateBtnLabel }}<\u002Fbutton>\n      <\u002Fsc-if>\n      <div style=\"{{ syncPillStyle }}\"><span style=\"{{ syncDotStyle }}\"><\u002Fspan>{{ syncLabel }}<\u002Fdiv>\n      <sc-if value=\"{{ showTvExit }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ onToggleTv }}\" style=\"background:transparent;border:1px solid rgba(255,255,255,0.3);color:#F3F1E8;border-radius:999px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;\">Exit<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ SCHEDULE STRIP (editor) ============ -->\n  <sc-if value=\"{{ showScheduleStrip }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"background:#EAE6D8;border-bottom:1px solid rgba(30,58,44,0.08);padding:12px 32px;display:flex;gap:20px;align-items:center;overflow-x:auto;\">\n    <span style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#7A7154;font-weight:700;white-space:nowrap;\">Now Playing<\u002Fspan>\n    <sc-for list=\"{{ scheduleItems }}\" as=\"sched\" hint-placeholder-count=\"2\">\n      <div style=\"display:flex;align-items:center;gap:10px;white-space:nowrap;background:#FFFFFF;border:1px solid rgba(30,58,44,0.10);border-radius:999px;padding:6px 14px;box-shadow:0 2px 8px rgba(30,58,44,0.05);\">\n        <span style=\"display:inline-flex;align-items:center;justify-content:center;height:20px;padding:0 9px;border-radius:999px;background:#1E3A2C;color:#F6F1E3;font-size:11px;font-weight:700;white-space:nowrap;\">{{ sched.courtLabel }}<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#C9A96A;color:#1 \">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ setupIsCompass }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:18px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #EFE9DA;\">\n            <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Bracket Size<\u002Fspan>\n            <button onclick=\"{{ onSetCompass8 }}\" style=\"{{ compass8BtnStyle }}\">8<\u002Fbutton>\n            <button onclick=\"{{ onSetCompass16 }}\" style=\"{{ compass16BtnStyle }}\">16<\u002Fbutton>\n            <span style=\"font-size:12px;color:#9A9480;\">compass draw works best at 8 or 16<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ setupIsCompass }}\" hint-placeholder-val=\"{{ false }}\">\n        <\u002Fsc-if>\n        <sc-if value=\"{{ setupIsPods }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 24px;border-bottom:1px solid #EFE9DA;\">\n            <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">Round-robin pods use a fixed field of <b style=\"color:#1E3A2C;\">8 teams<\u002Fb> — snake-seeded into two pods of four. Seeds 1–8 below set the pod split.<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n              <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Advance<\u002Fspan>\n              <button onclick=\"{{ onSetAdv1 }}\" style=\"{{ setupAdv1Style }}\">1 per pod<\u002Fbutton>\n              <button onclick=\"{{ onSetAdv2 }}\" style=\"{{ setupAdv2Style }}\">2 per pod<\u002Fbutton>\n              <span style=\"font-size:12px;color:#9A9480;\">\n                <sc-if value=\"{{ setupAdv1 }}\" hint-placeholder-val=\"{{ false }}\">pod winners meet in a single final<\u002Fsc-if>\n                <sc-if value=\"{{ setupAdv2 }}\" hint-placeholder-val=\"{{ true }}\">top two cross over into a 4-team championship draw<\u002Fsc-if>\n              <\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ setupIsSingle }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"padding:18px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #EFE9DA;\">\n            <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Bracket Size<\u002Fspan>\n            <button onclick=\"{{ onSizeDown }}\" style=\"width:28px;height:28px;border-radius:6px;border:1px solid #D9CDA9;background:#EFE9DA;cursor:pointer;font-size:15px;\">–<\u002Fbutton>\n            <span style=\"font-family:'Marcellus',serif;font-size:18px;width:24px;text-align:center;\">{{ setupSize }}<\u002Fspan>\n            <button onclick=\"{{ onSizeUp }}\" style=\"width:28px;height:28px;border-radius:6px;border:1px solid #D9CDA9;background:#EFE9DA;cursor:pointer;font-size:15px;\">+<\u002Fbutton>\n            <span style=\"font-size:12px;color:#9A9480;\">teams (6–16); empty slots are byes<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"padding:10px 24px 22px;display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ setupTeams }}\" as=\"tm\" hint-placeholder-count=\"8\">\n            <div draggable=\"true\" style=\"{{ tm.rowStyle }}\" ondragstart=\"{{ tm.onDragStart }}\" ondragover=\"{{ tm.onDragOver }}\" ondrop=\"{{ tm.onDrop }}\" ondragend=\"{{ tm.onDragEnd }}\">\n              <span style=\"cursor:grab;color:#C4BBA0;font-size:14px;padding:0 2px;user-select:none;\" title=\"Drag to reseed\">⠿<\u002Fspan>\n              <span style=\"width:20px;font-size:12px;color:#9A9480;font-weight:700;\">{{ tm.seed }}<\u002Fspan>\n              <input value=\"{{ tm.p1 }}\" onchange=\"{{ tm.onP1 }}\" placeholder=\"Player 1\" style=\"flex:1;font-size:13px;border:1px solid #E2D9C4;border-radius:6px;padding:7px 10px;\">\n              <span style=\"color:#B08A4F;\">/<\u002Fspan>\n              <input value=\"{{ tm.p2 }}\" onchange=\"{{ tm.onP2 }}\" placeholder=\"Player 2\" style=\"flex:1;font-size:13px;border:1px solid #E2D9C4;border-radius:6px;padding:7px 10px;\">\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:14px 24px;border-top:1px solid #E2D9C4;display:flex;justify-content:flex-end;\">\n          <button onclick=\"{{ onCloseSetup }}\" style=\"background:#1E3A2C;color:#F6F1E3;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ LIVE CONSOLE ============ -->\n  <sc-if value=\"{{ consoleOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:60;background:#F3F1E8;display:flex;flex-direction:column;overflow:hidden;\">\n      <div style=\"flex:0 0 auto;background:#1E3A2C;color:#F6F1E3;padding:16px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:#C0623C;box-shadow:0 0 0 4px rgba(192,98,60,0.25);\"><\u002Fspan>\n          <span style=\"font-family:'Marcellus',serif;font-size:22px;\">Live Console<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <button onclick=\"{{ onUndo }}\" disabled=\"{{ consoleUndoDisabled }}\" style=\"{{ undoBtnStyle }}\">↩ Undo<\u002Fbutton>\n          <button onclick=\"{{ onCloseConsole }}\" style=\"font-size:14px;font-weight:700;border-radius:999px;padding:9px 18px;cursor:pointer;border:1px solid rgba(246,241,227,0.4);background:transparent;color:#F6F1E3;\">✕ Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;overflow-y:auto;padding:22px 26px 40px;\">\n        <div style=\"font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#B08A4F;margin-bottom:12px;\">Courts — tap a match to score<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px;\">\n          <sc-for list=\"{{ consoleView.courtCards }}\" as=\"cc\" hint-placeholder-count=\"4\">\n            <div style=\"{{ cc.cardStyle }}\" onclick=\"{{ cc.onScore }}\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                <span style=\"font-family:'Marcellus',serif;font-size:20px;color:#1E3A2C;\">{{ cc.courtLabel }}<\u002Fspan>\n                <sc-if value=\"{{ cc.occupied }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"font-size:12px;color:#9A9480;\">⏱ {{ cc.elapsed }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <sc-if value=\"{{ cc.occupied }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"display:flex;align-items:center;gap:8px;\">\n                  <span style=\"{{ cc.divStyle }};display:inline-flex;align-items:center;padding:2px 8px;height:20px;border-radius:5px;font-size:10px;font-weight:800;white-space:nowrap;\">{{ cc.divName }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:700;color:#B08A4F;letter-spacing:0.3px;\">{{ cc.tag }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                  <div style=\"font-size:17px;font-weight:700;color:#26271F;\">{{ cc.aName }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#B08A4F;font-weight:800;\">vs<\u002Fdiv>\n                  <div style=\"font-size:17px;font-weight:700;color:#26271F;\">{{ cc.bName }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:2px;align-self:flex-start;background:#1E3A2C;color:#F6F1E3;font-size:12px;font-weight:800;letter-spacing:0.5px;padding:8px 16px;border-radius:999px;\">Enter Score →<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ cc.empty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"text-align:center;color:#B8B09A;\">\n                  <div style=\"font-size:15px;font-weight:700;\">Open<\u002Fdiv>\n                  <div style=\"font-size:12px;margin-top:2px;\">next match auto-fills<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ consoleView.hasPods }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#B08A4F;margin-bottom:10px;\">Rounds<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:14px;\">\n            <sc-for list=\"{{ consoleView.tabs }}\" as=\"tb\" hint-placeholder-count=\"3\">\n              <div style=\"{{ tb.style }}\" onclick=\"{{ tb.onClick }}\">{{ tb.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:16px;max-width:900px;\">\n            <sc-for list=\"{{ consoleView.current.groups }}\" as=\"grp\" hint-placeholder-count=\"2\">\n              <div>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px;\">\n                  <span style=\"{{ grp.divStyle }};display:inline-flex;align-items:center;padding:3px 12px;height:24px;border-radius:6px;font-size:13px;font-weight:800;white-space:nowrap;\">{{ grp.divName }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                  <sc-for list=\"{{ grp.matches }}\" as=\"m\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;align-items:center;gap:12px;background:#FFFFFF;border:1px solid #E9E2CF;border-radius:12px;padding:12px 16px;cursor:pointer;\" onclick=\"{{ m.onScore }}\">\n                      <span style=\"font-size:10px;font-weight:800;color:#B08A4F;flex:0 0 auto;width:46px;\">{{ m.tag }}<\u002Fspan>\n                      <sc-if value=\"{{ m.onCourt }}\" hint-placeholder-val=\"{{ false }}\">\n                        <span style=\"flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;height:22px;padding:0 9px;border-radius:6px;background:#1E3A2C;color:#F6F1E3;font-size:11px;font-weight:800;white-space:nowrap;\">{{ m.courtLabel }}<\u002Fspan>\n                      <\u002Fsc-if>\n                      <span style=\"flex:1;min-width:0;font-size:15px;color:#26271F;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ m.aName }}<\u002Fspan>\n                      <span style=\"flex:0 0 auto;font-size:14px;font-weight:800;color:#1E3A2C;min-width:34px;text-align:center;\">{{ m.scoreText }}<\u002Fspan>\n                      <span style=\"flex:1;min-width:0;font-size:15px;color:#26271F;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ m.bName }}<\u002Fspan>\n                      <span style=\"{{ m.status.style }};flex:0 0 auto;font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;white-space:nowrap;\">{{ m.status.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- score pad -->\n      <sc-if value=\"{{ hasScorePad }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;inset:0;background:rgba(20,26,20,0.6);display:flex;align-items:flex-end;justify-content:center;\" onclick=\"{{ scorePadView.onCancel }}\">\n          <div style=\"background:#FBF8F1;border-radius:22px 22px 0 0;width:560px;max-width:100%;padding:22px 24px 28px;box-shadow:0 -20px 60px rgba(0,0,0,0.3);\" onclick=\"{{ stopClick }}\">\n            <div style=\"display:flex;gap:12px;margin-bottom:18px;\">\n              <div style=\"{{ scorePadView.aBox.style }}\" onclick=\"{{ scorePadView.onPickA }}\">\n                <div style=\"font-size:13px;font-weight:700;color:#6B6A5E;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ scorePadView.aName }}<\u002Fdiv>\n                <div style=\"font-family:'Marcellus',serif;font-size:40px;color:#1E3A2C;\">{{ scorePadView.aVal }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"{{ scorePadView.bBox.style }}\" onclick=\"{{ scorePadView.onPickB }}\">\n                <div style=\"font-size:13px;font-weight:700;color:#6B6A5E;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ scorePadView.bName }}<\u002Fdiv>\n                <div style=\"font-family:'Marcellus',serif;font-size:40px;color:#1E3A2C;\">{{ scorePadView.bVal }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;\">\n              <sc-for list=\"{{ scorePadView.digitKeys }}\" as=\"dk\" hint-placeholder-count=\"10\">\n                <button onclick=\"{{ dk.onPress }}\" style=\"{{ digitKeyStyle }}\">{{ dk.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n              <button onclick=\"{{ scorePadView.onDel }}\" style=\"padding:18px;border-radius:14px;border:1px solid #E2D9C4;background:#F1EFE6;font-size:20px;cursor:pointer;\">⌫<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;margin-top:6px;\">\n              <button onclick=\"{{ scorePadView.onCancel }}\" style=\"flex:1;padding:16px;border-radius:14px;border:1px solid #D9CDA9;background:transparent;color:#6B6A5E;font-size:15px;font-weight:700;cursor:pointer;\">Cancel<\u002Fbutton>\n              <button onclick=\"{{ scorePadView.onSave }}\" style=\"{{ scorePadView.saveStyle }}\">Save Result<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ ORDER OF PLAY MODAL ============ -->\n  <sc-if value=\"{{ scheduleOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,20,0.55);display:flex;align-items:center;justify-content:center;z-index:57;\" onclick=\"{{ onToggleSchedule }}\">\n      <div style=\"background:#FBF8F1;border-radius:16px;width:860px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,0.35);\" onclick=\"{{ stopClick }}\">\n        <div style=\"padding:20px 26px;border-bottom:1px solid #E2D9C4;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#FBF8F1;z-index:2;\">\n          <div>\n            <div style=\"font-family:'Marcellus',serif;font-size:22px;color:#1E3A2C;\">Order of Play<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9A9480;margin-top:2px;\">{{ orderOfPlay.courtsLabel }} — enter games won and the crosstable updates instantly.<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onToggleSchedule }}\" style=\"border:none;background:transparent;font-size:18px;cursor:pointer;color:#6B6A5E;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:12px 26px 24px;\">\n          <div style=\"display:flex;gap:16px;align-items:center;margin:4px 0 6px;\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#6B6A5E;\"><span style=\"width:12px;height:12px;border-radius:3px;background:#1E3A2C;\"><\u002Fspan>A Division<\u002Fspan>\n            <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:11px;color:#6B6A5E;\"><span style=\"width:12px;height:12px;border-radius:3px;background:#7C5A2E;\"><\u002Fspan>B Division<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ orderOfPlay.hasPods }}\" hint-placeholder-val=\"{{ true }}\">\n            <sc-for list=\"{{ orderOfPlay.groups }}\" as=\"g\" hint-placeholder-count=\"3\">\n              <div style=\"font-family:'Marcellus',serif;font-size:16px;color:#1E3A2C;border-bottom:2px solid #B08A4F;padding-bottom:5px;margin:16px 0 4px;\">{{ g.title }}<\u002Fdiv>\n              <sc-for list=\"{{ g.courtRows }}\" as=\"cr\" hint-placeholder-count=\"4\">\n                <sc-if value=\"{{ cr.showWave }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#B8B09A;margin:8px 0 2px;\">{{ cr.waveLabel }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"{{ cr.rowWrapStyle }}\">\n                  <span style=\"flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;height:28px;width:44px;border-radius:7px;background:#F0EAD8;color:#1E3A2C;font-size:11px;font-weight:800;white-space:nowrap;\">{{ cr.courtLabel }}<\u002Fspan>\n                  <sc-if value=\"{{ cr.open }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"flex:1;font-size:12px;color:#C4BBA0;font-style:italic;padding-left:4px;\">Open — no match this wave<\u002Fspan>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ cr.hasMatch }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"{{ cr.divStyle }};flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;padding:0 8px;height:20px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:0.3px;white-space:nowrap;\">{{ cr.divName }}<\u002Fspan>\n                    <span style=\"{{ cr.podStyle }};flex:0 0 auto;font-size:9px;font-weight:800;letter-spacing:0.3px;padding:3px 7px;border-radius:999px;white-space:nowrap;\">{{ cr.podTag }}<\u002Fspan>\n                    <span style=\"flex:1;min-width:0;font-size:12px;color:#26271F;text-align:right;overflow:hidden;text-overflow e=\"width:28px;height:28px;border-radius:8px;border:1px solid rgba(30,58,44,0.15);background:#F1EFE6;cursor:pointer;font-size:15px;\">+<\u002Fbutton>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button onclick=\"{{ onToggleShowSeeds }}\" style=\"{{ showSeedsBtnStyle }}\">{{ showSeedsBtnLabel }}<\u002Fbutton>\n          <button onclick=\"{{ onToggleShuffle }}\" style=\"{{ shuffleBtnStyle }}\">🔀 {{ shuffleBtnLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:0 26px 18px;margin-top:-8px;\">\n          <span style=\"font-size:11px;color:#9A9480;\">{{ shuffleManagerHint }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ anyPods }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:4px;\">Round Robin Scoring<\u002Fdiv>\n          <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">How pod standings are ranked and pod winners determined.<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\">\n            <div onclick=\"{{ onRrWins }}\" style=\"{{ rrWinsStyle }}\">\n              <div style=\"font-size:13px;\">Win / Loss Record<\u002Fdiv>\n              <div style=\"font-size:10px;font-weight:500;opacity:0.75;margin-top:2px;\">Most match wins<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ onRrGames }}\" style=\"{{ rrGamesStyle }}\">\n              <div style=\"font-size:13px;\">Total Games Won<\u002Fdiv>\n              <div style=\"font-size:10px;font-weight:500;opacity:0.75;margin-top:2px;\">Games add up across matches<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"padding:20px 26px;display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;\">Divisions<\u002Fdiv>\n          <sc-for list=\"{{ divisionViews }}\" as=\"dv\" hint-placeholder-count=\"2\">\n            <div style=\"border:1px solid #E2D9C4;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px;\">\n              <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n                <span style=\"{{ dv.badgeStyle }}\">{{ dv.id }}<\u002Fspan>\n                <input value=\"{{ dv.name }}\" onchange=\"{{ dv.onNameChange }}\" style=\"font-family:'Marcellus',serif;font-size:18px;color:#1E3A2C;background:transparent;border:none;outline:none;flex:1;min-width:120px;\">\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:10px;align-items:center;flex-wrap:wrap;\">\n                <select value=\"{{ dv.format }}\" onchange=\"{{ dv.onFormatChange }}\" style=\"font-size:13px;font-weight:700;border:1.5px solid #1E3A2C;border-radius:8px;padding:8px 12px;color:#1E3A2C;background:#FBF8F1;\">\n                  <option value=\"compass\" selected=\"{{ dv.isCompass }}\">Compass Draw<\u002Foption>\n                  <option value=\"pods\" selected=\"{{ dv.isPods }}\">Round Robin Pods<\u002Foption>\n                <\u002Fselect>\n                <button onclick=\"{{ dv.onSetup }}\" style=\"font-size:13px;font-weight:700;border:1.5px solid #1E3A2C;background:#1E3A2C;color:#F6F1E3;border-radius:8px;padding:8px 14px;cursor:pointer;\">Edit Draw / Players<\u002Fbutton>\n                <button onclick=\"{{ dv.onReset }}\" style=\"font-size:13px;font-weight:700;border:1.5px solid #C0623C;background:transparent;color:#C0623C;border-radius:8px;padding:8px 14px;cursor:pointer;\">Reset Bracket<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"padding:20px 26px;border-top:1px solid rgba(30,58,44,0.08);\">\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:4px;\">Backup / Records<\u002Fdiv>\n          <div style=\"font-size:12px;color:#9A9480;margin-bottom:12px;\">Save a printable results snapshot — standings, every score, and current courts. Keep it as a PDF so you can finish the event on paper if anything goes wrong.<\u002Fdiv>\n          <button onclick=\"{{ onPrintReport }}\" style=\"font-size:14px;font-weight:800;letter-spacing:0.3px;border:none;background:#B08A4F;color:#FBF8F1;border-radius:10px;padding:12px 20px;cursor:pointer;\">⬇ Save Results as PDF<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"padding:18px 26px;border-top:1px solid #E2D9C4;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;\">\n          <a href=\"Presentation Display.dc.html\" target=\"_blank\" style=\"font-size:13px;font-weight:700;color:#1E3A2C;text-decoration:underline;\">🖥 Open standalone Presentation Display ↗<\u002Fa>\n          <button onclick=\"{{ onToggleManager }}\" style=\"background:#1E3A2C;color:#F6F1E3;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:13px;cursor:pointer;\">Done<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PLANNER MODAL ============ -->\n  <sc-if value=\"{{ plannerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,26,20,0.55);display:flex;align-items:center;justify-content:center;z-index:55;\" onclick=\"{{ onTogglePlanner }}\">\n      <div style=\"background:#FFFFFF;border-radius:18px;width:600px;max-width:92vw;max-height:84vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,0.35);\" onclick=\"{{ stopClick }}\">\n        <div style=\"padding:20px 26px;border-bottom:1px solid rgba(30,58,44,0.08);display:flex;justify-content:space-between;align-items:center;\">\n          <div style=\"font-family:'Marcellus',serif;font-size:21px;color:#1E3A2C;\">Match Planner<\u002Fdiv>\n          <button onclick=\"{{ onTogglePlanner }}\" style=\"border:none;background:transparent;font-size:18px;cursor:pointer;color:#6B6A5E;\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 26px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(30,58,44,0.06);flex-wrap:wrap;\">\n          <span style=\"font-size:12px;font-weight:700;color:#6B6A5E;text-transform:uppercase;letter-spacing:1px;\">Courts Available<\u002Fspan>\n          <button onclick=\"{{ onCourtsDown }}\" style=\"width:28px;height:28px;border-radius:8px;border:1px solid rgba(30,58,44,0.15);background:#F1EFE6;cursor:pointer;font-size:15px;\">–<\u002Fbutton>\n          <span style=\"font-family:'Marcellus',serif;font-size:18px;width:24px;text-align:center;\">{{ courtsCount }}<\u002Fspan>\n          <button onclick=\"{{ onCourtsUp }}\" style=\"width:28px;height:28px;border-radius:8px;border:1px solid rgba(30,58,44,0.15);background:#F1EFE6;cursor:pointer;font-size:15px;\">+<\u002Fbutton>\n          <div style=\"flex:1;\"><\u002Fdiv>\n          <button onclick=\"{{ onToggleShuffle }}\" style=\"{{ shuffleBtnStyle }}\">🔀 Shuffle<\u002Fbutton>\n          <button onclick=\"{{ onAutoAssign }}\" style=\"background:#1E3A2C;color:#F6F1E3;border:none;border-radius:999px;padding:9px 18px;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:0.5px;\">Auto-Assign Courts<\u002Fbutton>\n          <button onclick=\"{{ onClearAssignments }}\" style=\"background:transparent;color:#C0623C;border:1px solid #C0623C;border-radius:999px;padding:9px 16px;font-weight:700;font-size:12px;cursor:pointer;\">Clear<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:0 26px;margin-top:-6px;\">\n          <span style=\"font-size:11px;color:#9A9480;\">{{ shuffleHint }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:18px 26px;display:flex;flex-direction:column;gap:16px;\">\n          <div>\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:8px;\">On Court Now<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px;\">\n              <sc-for list=\"{{ onCourtItems }}\" as=\"it\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:10px;background:#F8F6EF;border:1px solid rgba(30,58,44,0.08);border-radius:10px;padding:8px 12px;\">\n                  <span style=\"display:inline-flex;align-items:center;justify-content:center;height:26px;padding:0 10px;border-radius:999px;background:#1E3A2C;color:#F6F1E3;font-size:12px;font-weight:700;white-space:nowrap;\">{{ it.courtLabel }}<\u002Fspan>\n                  <span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#C9A96A;color:#1E3A2C;font-size:10px;font-weight:800;\">{{ it.divId }}<\u002Fspan>\n                  <span style=\"font-size:13px;color:#26271F;\">{{ it.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasQueue }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#8A8362;margin-bottom:8px;\">Up Next — auto-fills the next open court<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                <sc-for list=\"{{ queueItems }}\" as=\"it\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;align-items:center;gap:10px;background:#FBF8F1;border:1px dashed #D9CDA9;border-radius:10px;padding:8px 12px;\">\n                    <span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 6px;border-radius:999px;background:#EFE9DA;color:#6B6A5E;font-size:12px;font-weight:700;\">#{{ it.pos }}<\u002Fspan>\n                    <span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:#EFE9DA;color:#6B6A5E;font-size:10px;font-weight:800;\">{{ it.divId }}<\u002Fspan>\n                    <span style=\"font-size:13px;color:#6B6A5E;\">{{ it.text }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ readyUnassignedCount }}\" hint-placeholder-val=\"{{ false }}\">\n            <div>\n              <div style=\"font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#C0623C;margin-bottom:8px;\">Waiting — {{ readyUnassignedCount }} Ready, Not Yet Assigned<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                <sc-for list=\"{{ readyUnassignedLabels }}\" as=\"lb\" hint-placeholder-count=\"2\">\n                  <div style=\"font-size:13px;color:#6B6A5E;padding:6px 12px;\">{{ lb }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TV CHAMPION SPOTLIGHT OVERLAY ============ -->\n  <sc-if value=\"{{ spotlightDiv }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:radial-gradient(circle at center, #234A38 0%, #142A1F 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:60;\" onclick=\"{{ onCloseSpotlight }}\">\n      <div style=\"font-size:13px;letter-spacing:6px;text-transform:uppercase;color:#C9A96A;margin-bottom:18px;\">{{ spotlightDivName }} Champions<\u002Fdiv>\n      <div style=\"font-family:'Marcellus',serif;font-size:76px;color:#F6F1E3;text-align:center;line-height:1.1;text-shadow:0 4px 30px rgba(0,0,0,0.4);\">{{ spotlightName }}<\u002Fdiv>\n      <div style=\"margin-top:26px;width:64px;height:3px;background:#B08A4F;\"><\u002Fdiv>\n      <div style=\"margin-top:22px;font-size:13px;color:#C9A96A;letter-spacing:1px;\">Click anywhere to return<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst SURN_A = ['Whitaker','Ellison','Marchetti','Delacroix','Hargrove','Sinclair','Abernathy','Kingsley','Fontaine','Beaumont','Prescott','Ashford','Lockwood','Rutherford','Carrington','Vandenberg'];\nconst SURN_B = ['Cole','Nguyen','Ibarra','Rossi','Okafor','Bianchi','Mendez','Park','Larsen','Haddad','Serrano','Volkov','Reyes','Kaur','Novak','Faber'];\nconst STORE_KEY = 'tbm_state_v1';\n\n// ===== Live sync (Supabase) =====\nconst SUPABASE_URL = 'https://yvisuaocnzzplrscvlkx.supabase.co';\nconst SUPABASE_KEY = 'sb_publishable_NgJaxs9OLbC2MTmuI-5Mlg_Ppk6yWGj';\nconst TOURNEY_CODE = '1890';\n// only the tournament DATA syncs across devices — per-device view state (which screen\n// you're looking at, open modals, presentation toggle) stays local to each device.\nconst SHARED_KEYS = ['title','sub','courts','courtBoard','queue','assignedAt','divisions','history'];\nfunction pickShared(s){ const o = {}; SHARED_KEYS.forEach(k => { if(s[k] !== undefined) o[k] = s[k]; }); return o; }\n\nfunction pow2(n){ let p=1; while(p<n) p*=2; return p; }\n// round-robin schedule for a 4-team pod (circle method): 3 rounds, 2 simultaneous matches each\nconst POD_SCHEDULE = [ [[0,3],[1,2]], [[0,2],[3,1]], [[0,1],[2,3]] ];\nfunction seedPositions(np){\n  let a=[1];\n  while(a.length<np){\n    const m=a.length*2+1; const b=[];\n    for(const s of a){ b.push(s); b.push(m-s); }\n    a=b;\n  }\n  return a;\n}\nfunction shuffleArr(arr){\n  const a = arr.slice();\n  for(let i=a.length-1;i>0;i--){\n    const j = Math.floor(Math.random()*(i+1));\n    const t = a[i]; a[i]=a[j]; a[j]=t;\n  }\n  return a;\n}\nfunction roundLabel(r, R){\n  const d = R-1-r;\n  if(d===0) return 'Final';\n  if(d===1) return 'Semifinals';\n  if(d===2) return 'Quarterfinals';\n  if(d===3) return 'Round of 16';\n  if(d===4) return 'Round of 32';\n  return 'Round ' + (r+1);\n}\n\n// pure bracket compute — teams in seed order, results namespaced by prefix (e.g. 'E-','W-','' )\nfunction computeBracket(teams, resultsAll, prefix){\n  const N = teams.length;\n  const np = pow2(Math.max(2,N));\n  const R = Math.log2(np);\n  const order = seedPositions(np);\n  const teamBySeed = (s) => (s <= N ? teams[s-1] : null);\n\n  const rounds = [];\n  const r0 = [];\n  for(let m=0;m<np/2;m++) r0.push([teamBySeed(order[2*m]), teamBySeed(order[2*m+1])]);\n  rounds.push(r0.map(pair => ({ slots: pair })));\n\n  const winnerOf = (r, i, slots) => {\n    const res = resultsAll[prefix+r+'-'+i];\n    if(res && res.winner != null) return slots[res.winner];\n    if(slots[0] && !slots[1]) return slots[0];\n    if(slots[1] && !slots[0]) return slots[1];\n    return null;\n  };\n  const loserOf = (r, i, slots) => {\n    const res = resultsAll[prefix+r+'-'+i];\n    if(!slots[0] || !slots[1]) return null;\n    if(!res || res.winner == null) return null;\n    return slots[res.winner === 0 ? 1 : 0];\n  };\n\n  for(let r=1;r<R;r++){\n    const prev = rounds[r-1];\n    const cnt = prev.length/2;\n    const arr = [];\n    for(let i=0;i<cnt;i++){\n      const w0 = winnerOf(r-1, 2*i, prev[2*i].slots);\n      const w1 = winnerOf(r-1, 2*i+1, prev[2*i+1].slots);\n      arr.push({ slots:[w0,w1] });\n    }\n    rounds.push(arr);\n  }\n\n  let champion = null;\n  const finalWinner = winnerOf(R-1, 0, rounds[R-1][0].slots);\n  if(finalWinner) champion = finalWinner;\n\n  return { rounds, R, np, winnerOf, loserOf, champion, prefix };\n}\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.isViewer = (typeof location !== 'undefined') && new URLSearchParams(location.search).has('view');\n    this.state = this.loadState() || this.seedState();\n    if(!this.state.courtBoard) this.state.courtBoard = {};\n    if(!this.state.queue) this.state.queue = [];\n    this.state.syncStatus = 'connecting';\n  }\n\n  mkTeams(size){\n    const t = [];\n    for(let i=0;i<size;i++) t.push({ id:'t'+i, p1: SURN_A[i % SURN_A.length], p2: SURN_B[i % SURN_B.length] });\n    return t;\n  }\n\n  mkDivision(id, name, size){\n    return { id, name, format:'compass', size, teams: this.mkTeams(size), results: {}, advanceCount: 2 };\n  }\n\n  seedState(){\n    return {\n      title: 'Tennis Club Championship',\n      sub: 'Summer Invitational · 2026',\n      tv: false,\n      tvLayout: 'single',\n      rotate: false,\n      focus: 'A',\n      spotlightDismissed: {},\n      courts: 4,\n      courtBoard: {},\n      queue: [],\n      assignedAt: {},\n      plannerOpen: false,\n      consoleOpen: false,\n      consoleRound: 0,\n      scorePad: null,\n      history: [],\n      divisions: { A: this.mkDivision('A','A Division', 8), B: this.mkDivision('B','B Division', 8) },\n      setupOpen: null\n    };\n  }\n\n  loadState(){\n    try {\n      const raw = localStorage.getItem(STORE_KEY);\n      if(!raw) return null;\n      const s = JSON.parse(raw);\n      if(!s || !s.divisions) return null;\n      return s;\n    } catch(e){ return null; }\n  }\n\n  save(){\n    try { localStorage.setItem(STORE_KEY, JSON.stringify(this.state)); } catch(e){}\n    this.cloudPush();\n  }\n\n  // ===== Live sync =====\n  initSync(){\n    if(!(window.supabase && window.supabase.createClient)){\n      // library not ready yet — retry shortly\n      this._syncRetry = setTimeout(() => this.initSync(), 400);\n      return;\n    }\n    try {\n      this._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { realtime: { params: { eventsPerSecond: 5 } } });\n    } catch(e){ this.setState({ syncStatus:'offline' }); return; }\n\n    // 1. pull the current shared state on load\n    this._sb.from('tournaments').select('state').eq('code', TOURNEY_CODE).maybeSingle()\n      .then(({ data, error }) => {\n        if(error){ this.setState({ syncStatus:'offline' }); return; }\n        if(data && data.state){\n          this._lastRemote = JSON.stringify(data.state);\n          this.setState({ ...pickShared(data.state), syncStatus:'live' }, () => this.autoAssign());\n        } else {\n          this.setState({ syncStatus:'live' });\n          if(!this.isViewer) this.cloudPush(true); // editor seeds the record if empty\n        }\n      });\n\n    // 2. subscribe to live changes from other devices\n    this._chan = this._sb.channel('tourney-' + TOURNEY_CODE)\n      .on('postgres_changes', { event:'*', schema:'public', table:'tournaments', filter:'code=eq.'+TOURNEY_CODE },\n        (payload) => {\n          const remote = payload.new && payload.new.state;\n          if(!remote) return;\n          const rs = JSON.stringify(remote);\n          if(rs === this._lastRemote) return;       // ignore our own echo\n          this._lastRemote = rs;\n          if(this.isViewer || rs !== JSON.stringify(pickShared(this.state))){\n            this.setState({ ...pickShared(remote) }, () => this.autoAssign());\n          }\n        })\n      .subscribe((status) => {\n        if(status === 'SUBSCRIBED') this.setState({ syncStatus:'live' });\n      });\n  }\n\n  cloudPush(immediate){\n    if(this.isViewer || !this._sb) return;         // viewers never write\n    clearTimeout(this._pushTimer);\n    const doPush = () => {\n      const shared = pickShared(this.state);\n      const json = JSON.stringify(shared);\n      this._lastRemote = json;                      // mark as our own so the echo is ignored\n      this._sb.from('tournaments')\n        .upsert({ code: TOURNEY_CODE, state: shared, updated_at: new Date().toISOString() })\n        .then(({ error }) => { this.setState({ syncStatus: error ? 'offline' : 'live' }); });\n    };\n    if(immediate) doPush(); else this._pushTimer = setTimeout(doPush, 500);\n  }\n\n  componentDidMount(){\n    this._rotateTimer = setInterval(() => {\n      if(this.state.rotate) this.setState(s => ({ focus: s.focus === 'A' ? 'B' : 'A' }));\n    }, 12000);\n    this._clockTimer = setInterval(() => {\n      if(this.state.consoleOpen) this.forceUpdate();\n    }, 15000);\n    this._onResize = () => this.forceUpdate();\n    window.addEventListener('resize', this._onResize);\n    this.autoAssign();\n    this.initSync();\n  }\n  componentWillUnmount(){\n    clearInterval(this._rotateTimer);\n    clearInterval(this._clockTimer);\n    clearTimeout(this._syncRetry);\n    clearTimeout(this._pushTimer);\n    if(this._chan && this._sb) this._sb.removeChannel(this._chan);\n    window.removeEventListener('resize', this._onResize);\n    if(this._ro) this._ro.disconnect();\n  }\n\n  updateDiv(divId, fn){\n    this.setState(s => {\n      const nd = { ...s.divisions };\n      nd[divId] = fn({ ...nd[divId] });\n      return { divisions: nd };\n    }, () => this.save());\n  }\n\n  // ---- compass draw: East (main) -> West (E round0 losers) -> North (E round1 losers), South (W round0 losers)\n  buildCompass(div){\n    const builtE = computeBracket(div.teams, div.results, 'E-');\n    const sizeW = Math.max(2, Math.floor(div.size/2));\n    const teamsW = [];\n    for(let i=0;i<sizeW;i++){ const m = builtE.rounds[0][i]; teamsW.push(m ? builtE.loserOf(0,i,m.slots) : null); }\n    const builtW = computeBracket(teamsW, div.results, 'W-');\n\n    const sizeN = Math.max(2, Math.floor(div.size/4));\n    const teamsN = [];\n    for(let i=0;i<sizeN;i++){ const rd = builtE.rounds[1]; const m = rd && rd[i]; teamsN.push(m ? builtE.loserOf(1,i,m.slots) : null); }\n    const builtN = computeBracket(teamsN, div.results, 'N-');\n\n    const sizeS = sizeN;\n    const teamsS = [];\n    for(let i=0;i<sizeS;i++){ const m = builtW.rounds[0][i]; teamsS.push(m ? builtW.loserOf(0,i,m.slots) : null); }\n    const builtS = computeBracket(teamsS, div.results, 'S-');\n\n    return { E: builtE, W: builtW, N: builtN, S: builtS };\n  }\n\n  // ---- double elimination: winners bracket + losers bracket + single grand final ----\n  buildDoubleLosers(builtW, div, prefixL){\n    const n = builtW.R;\n    const results = div.results;\n    const lbRounds = [];\n    const roundWinners = (roundMatches, r) => roundMatches.map((m,i) => {\n      const res = results[prefixL+r+'-'+i];\n      if(res && res.winner != null) return m.slots[res.winner];\n      if(m.slots[0] && !m.slots[1]) return m.slots[0];\n      if(m.slots[1] && !m.slots[0]) return m.slots[1];\n      return null;\n    });\n    const pushRound = (pairs) => {\n      const r = lbRounds.length;\n      const matches = pairs.map(slots => ({ slots }));\n      lbRounds.push(matches);\n      return roundWinners(matches, r);\n    };\n    const wLosers = (wr) => builtW.rounds[wr].map((m,i) => builtW.loserOf(wr,i,m.slots));\n\n    const pool = wLosers(0);\n    let pairs = [];\n    for(let i=0;i<pool.length/2;i++) pairs.push([pool[2*i], pool[2*i+1]]);\n    let currentWinners = pushRound(pairs);\n\n    for(let wr=1; wr<n; wr++){\n      const incoming = wLosers(wr);\n      const acrossPairs = currentWinners.map((t,i) => [t, incoming[i]]);\n      currentWinners = pushRound(acrossPairs);\n      if(wr < n-1){\n        const cPairs = [];\n        for(let i=0;i<currentWinners.length/2;i++) cPairs.push([currentWinners[2*i], currentWinners[2*i+1]]);\n        currentWinners = pushRound(cPairs);\n      }\n    }\n    const champion = currentWinners[0] || null;\n    return {\n      rounds: lbRounds, R: lbRounds.length, champion,\n      loserOf: (r,i,slots) => {\n        const res = results[prefixL+r+'-'+i];\n        if(!slots[0] || !slots[1]) return null;\n        if(!res || res.winner == null) return null;\n        return slots[res.winner === 0 ? 1 : 0];\n      }\n    };\n  }\n\n  buildDouble(div){\n    const builtW = computeBracket(div.teams, div.results, 'DW-');\n    const builtL = this.buildDoubleLosers(builtW, div, 'DL-');\n    const gfSlots = [builtW.champion, builtL.champion];\n    const res = div.results['DF-0-0'];\n    let winner = null;\n    if(gfSlots[0] && gfSlots[1] && res && res.winner != null) winner = gfSlots[res.winner];\n    const builtGF = { rounds: [[{ slots: gfSlots }]], R: 1, champion: winner };\n    return { W: builtW, L: builtL, GF: builtGF };\n  }\n\n  // ---- round-robin pods: 2 pods of 4 (snake-seeded), crosstable scoring, pod winners meet in a final ----\n  buildPods(div){\n    const results = div.results;\n    const seeded = div.teams.map((t,idx) => ({ team:t, seed:idx+1 }));\n    const podArr = [[],[]];\n    seeded.forEach((s, idx) => { const block = Math.floor(idx/2), within = idx%2; const p = (block%2===0) ? within : (1-within); podArr[p].push(s); });\n\n    const buildPod = (p) => {\n      const members = podArr[p];\n      const n = members.length;\n      const stat = members.map(() => ({ w:0, l:0, gf:0, ga:0, played:0 }));\n      for(let i=0;i<n;i++) for(let j=0;j<n;j++){\n        if(i===j) continue;\n        const my = results['RR-'+p+'-'+i+'-'+j], opp = results['RR-'+p+'-'+j+'-'+i];\n        if(my!=null && my!=='' && opp!=null && opp!==''){\n          const a=+my, b=+opp; stat[i].gf+=a; stat[i].ga+=b; stat[i].played++;\n          if(a>b) stat[i].w++; else if(a<b) stat[i].l++;\n        }\n      }\n      let done=0, total=0;\n      for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){ total++; const a=results['RR-'+p+'-'+i+'-'+j], b=results['RR-'+p+'-'+j+'-'+i]; if(a!=null&&a!==''&&b!=null&&b!=='') done++; }\n      const complete = total>0 && done===total;\n      const order = members.map((m,i) => ({ ...m, i, ...stat[i], diff: stat[i].gf-stat[i].ga }));\n      const rrMode = div.rrScoring === 'games' ? 'games' : 'wins';\n      if(rrMode === 'games'){\n        order.sort((x,y) => (y.gf-x.gf) || (y.w-x.w) || (y.diff-x.diff));\n      } else {\n        order.sort((x,y) => (y.w-x.w) || (y.diff-x.diff) || (y.gf-x.gf));\n      }\n      const leaderLocal = order.length ? order[0].i : null;\n      return { members, stat, complete, order, leaderLocal, n };\n    };\n\n    const pod0 = buildPod(0), pod1 = buildPod(1);\n    const winner0 = (pod0.complete && pod0.leaderLocal!=null) ? pod0.members[pod0.leaderLocal] : null;\n    const winner1 = (pod1.complete && pod1.leaderLocal!=null) ? pod1.members[pod1.leaderLocal] : null;\n    const bothComplete = pod0.complete && pod1.complete;\n    let playoff = null, champion = null, seeds = null;\n    const adv = (div.advanceCount === 1) ? 1 : 2;\n    if(bothComplete && pod0.order.length>=adv && pod1.order.length>=adv){\n      const A1=pod0.order[0], B1=pod1.order[0];\n      if(adv === 1){\n        seeds = { A1, B1 };\n        // single final: pod A winner vs pod B winner\n        playoff = computeBracket([A1.team, B1.team], results, 'RRP-');\n      } else {\n        const A2=pod0.order[1], B2=pod1.order[1];\n        seeds = { A1, A2, B1, B2 };\n        // crossover: [A1, A2, B1, B2] -> SF: A1 v B2 and A2 v B1, then Final\n        playoff = computeBracket([A1.team, A2.team, B1.team, B2.team], results, 'RRP-');\n      }\n      champion = playoff.champion;\n    }\n    return { pod0, pod1, winner0, winner1, bothComplete, playoff, seeds, champion, adv };\n  }\n\n  setPodScore(divId, pod, i, j, val){\n    this.setState(s => {\n      const d = { ...s.divisions[divId] };\n      const results = { ...d.results };\n      const key = 'RR-'+pod+'-'+i+'-'+j;\n      if(val==='' || val==null) delete results[key]; else results[key] = val;\n      delete results['RRF-0-0'];\n      d.results = results;\n      const divisions = { ...s.divisions, [divId]: d };\n      return { divisions };\n    }, () => { this.save(); this.autoAssign(); });\n  }\n\n  renderPodsBoard(div, tv){\n    const raw = this.buildPods(div);\n    const adv = raw.adv;\n    const showSeeds = this.state.showSeeds !== false;\n    const letterOf = (li) => String.fromCharCode(65+li);\n    const base = tv ? '#F3F1E8' : '#26271F';\n    const muted = tv ? 'rgba(243,241,232,0.5)' : '#8A8362';\n    const cardBg = tv ? 'rgba(255,255,255,0.05)' : '#FF rder-box' };\n          if(tv){\n            return { textOnly:true, hasInput:false, display:(my!=null&&my!=='')?String(my):'\\u00b7', tdStyle:td, textStyle:{ color: win?gold:(loss?muted:base), fontWeight: win?800:600, fontSize:'16px' } };\n          }\n          return { hasInput:true, textOnly:false, value:(my!=null?my:''), onScore:(e)=>this.setPodScore(div.id,p,i,j,e.target.value), tdStyle:td, inputStyle:{ width:'100%', height:'100%', border:'none', background:'transparent', textAlign:'center', fontSize:'13px', fontWeight: win?800:600, color: win?'#1E3A2C':(loss?'#A79F7F':'#26271F'), outline:'none', padding:0 } };\n        });\n        const isLead = pod.leaderLocal===i && pod.complete;\n        const totalDisplay = rrMode==='games' ? String(st.gf) : (st.w+'\\u2013'+st.l);\n        const total = { display: totalDisplay, style:{ width:totalW+'px', height:cellH+'px', display:'flex', alignItems:'center', justifyContent:'center', background: tv?'rgba(201,169,106,0.12)':'#FBF5E6', border, boxSizing:'border-box', fontSize:(tv?15:12)+'px', fontWeight:800, color: base, fontVariantNumeric:'tabular-nums' } };\n        return { badge: showSeeds?String(m.seed):letterOf(i), headStyle:{ width:labelColW+'px', height:cellH+'px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:(tv?13:11)+'px', fontWeight:800, color: isLead?gold:base, background: tv?'rgba(255,255,255,0.04)':'#F8F6EF', border }, cells, total };\n      });\n      const standings = pod.order.map((o,idx) => {\n        const adv2 = idx<adv && pod.complete;\n        return {\n          rank:idx+1, badge: showSeeds?String(o.seed):letterOf(o.i), name:o.team.p1+' / '+o.team.p2,\n          record:o.w+'\\u2013'+o.l, diff:((o.gf-o.ga)>=0?'+':'')+(o.gf-o.ga), advances:adv2, isLeader:idx===0,\n          rowStyle:{ display:'flex', alignItems:'center', gap:'8px', padding:(tv?'6px 12px':'4px 10px'), borderRadius:'8px', background: adv2?(tv?'rgba(201,169,106,0.18)':'#F6EFDD'):'transparent' },\n          badge  }\n      return d;\n    });\n    this.clearDivAssignments(divId);\n  }\n\n  setCourts(n){\n    const courts = Math.max(1, Math.min(12, n));\n    this.setState({ courts }, () => { this.save(); this.autoAssign(); });\n  }\n  togglePlanner(){ this.setState(s => ({ plannerOpen: !s.plannerOpen })); }\n  toggleManager(){ this.setState(s => ({ managerOpen: !s.managerOpen })); }\n  toggleSchedule(){ this.setState(s => ({ scheduleOpen: !s.scheduleOpen })); }\n\n  setAdvanceCount(divId, n){\n    this.updateDiv(divId, d => {\n      d.advanceCount = (n === 1) ? 1 : 2;\n      Object.keys(d.results).forEach(k => { if(k.indexOf('RRP-')===0) delete d.results[k]; });\n      return d;\n    });\n    this.clearDivAssignments(divId);\n  }\n\n  // score entry for the pod playoff bracket: set a side's games; winner auto-derives from the higher score\n  setPlayoffScore(divId, r, i, side, val){\n    this.setState(s => {\n      const d = { ...s.divisions[divId] };\n      const results = { ...d.results };\n      const key = 'RRP-'+r+'-'+i;\n      const cur = results[key] || {};\n      const scores = [ (cur.scores||['',''])[0], (cur.scores||['',''])[1] ];\n      scores[side] = val;\n      let winner = cur.winner!=null ? cur.winner : null;\n      const a = scores[0], b = scores[1];\n      if(a!=='' && a!=null && b!=='' && b!=null){ if(+a>+b) winner=0; else if(+b>+a) winner=1; }\n      results[key] = { ...cur, scores, winner };\n      // re-entering a semifinal score can change who advances — clear the dependent final\n      if(r === 0) delete results['RRP-1-0'];\n      d.results = results;\n      return { divisions: { ...s.divisions, [divId]: d } };\n    }, () => { this.save(); this.autoAssign(); });\n  }\n  setTvLayout(v){ this.setState({ tvLayout: v }); }\n\n  // Court + queue system: courts hold the match currently being played; extra ready matches\n  // wait in an ordered queue and auto-fill the next open court the instant a result is entered.\n  autoAssign(){\n    const s = this.state;\n    const courts = s.courts || 4;\n    const readyInfo = {};\n    ['A','B'].forEach(divId => {\n      this.getReadyMatches(s.divisions[divId]).forEach(rm => { readyInfo[divId+'|'+rm.key] = rm.round; });\n    });\n\n    let courtBoard = { ...(s.courtBoard||{}) };\n    let queue = (s.queue||[]).filter(k => readyInfo[k] !== undefined);\n\n    // drop stale court occupants (match completed / no longer exists) and courts beyond current count\n    Object.keys(courtBoard).forEach(c => {\n      const k = courtBoard[c];\n      if(Number(c) > courts){ if(k) queue.unshift(k); delete courtBoard[c]; }\n      else if(k && readyInfo[k] === undefined){ courtBoard[c] = null; }\n    });\n    for(let c=1;c<=courts;c++){ if(!(c in courtBoard)) courtBoard[c] = null; }\n\n    const already = new Set([...Object.values(courtBoard).filter(Boolean), ...queue]);\n    let newKeys = Object.keys(readyInfo).filter(k => !already.has(k));\n    if(s.shuffleCourts){\n      const byRound = {};\n      newKeys.forEach(k => { const r = readyInfo[k]; (byRound[r] = byRound[r]||[]).push(k); });\n      newKeys = Object.keys(byRound).flatMap(r => shuffleArr(byRound[r]));\n    }\n    queue = [...queue, ...newKeys];\n\n    // fill any open court from the front of the queue\n    for(let c=1;c<=courts;c++){ if(!courtBoard[c] && queue.length){ courtBoard[c] = queue.shift(); } }\n\n    const now = Date.now();\n    const assignedAt = { ...(s.assignedAt||{}) };\n    const live = new Set(Object.values(courtBoard).filter(Boolean));\n    live.forEach(k => { if(!assignedAt[k]) assignedAt[k] = now; });\n    Object.keys(assignedAt).forEach(k => { if(!live.has(k)) delete assignedAt[k]; });\n\n    this.setState({ courtBoard, queue, assignedAt }, () => this.save());\n  }\n\n  toggleShuffle(){ this.setState(s => ({ shuffleCourts: !s.shuffleCourts })); }\n  toggleShowSeeds(){ this.setState(s => ({ showSeeds: !(s.showSeeds !== false) }), () => this.save()); }\n  setRrScoring(mode){\n    this.setState(s => {\n      const divisions  r=0;r<pl.R;r++) pl.rounds[r].forEach((m,i)=>{ if(!m.slots[0]||!m.slots[1]) return;\n          const res=div.results['RRP-'+r+'-'+i]||{}; const sc=res.scores||['','']; const done=res.winner!=null;\n          const wn=done?(res.winner===0?m.slots[0]:m.slots[1]):null;\n          out += '<tr><td>'+esc(m.slots[0].p1+'/'+m.slots[0].p2+' vs '+m.slots[1].p1+'/'+m.slots[1].p2)+'<\u002Ftd><td>'+(done?(sc[0]+'–'+sc[1]):'—')+'<\u002Ftd><td>'+(wn?esc(wn.p1+'/'+wn.p2):'—')+'<\u002Ftd><\u002Ftr>';\n        });\n        out += '<\u002Ftable>';\n      }\n    } else {\n      const scan = (built, tag) => {\n        out += '<table class=\"log\"><tr><th>'+tag+' — Match<\u002Fth><th>Score<\u002Fth><th>Winner<\u002Fth><\u002Ftr>';\n        for(let r=0;r<built.R;r++) built.rounds[r].forEach((m,i)=>{ if(!m.slots[0]||!m.slots[1]) return;\n          const res=div.results[(built.prefix||'')+r+'-'+i]||{}; const sc=res.scores||['','']; const done=res.winner!=null;\n          const wn=done?(res.winner===0?m.slots[0]:m.slots[1]):null;\n          out += '<tr><td>'+roundLabel(r,built.R)+': '+esc(m.slots[0].p1+'/'+m.slots[0].p2+' vs '+m.slots[1].p1+'/'+m.slots[1].p2)+'<\u002Ftd><td>'+(done?(sc[0]+'–'+sc[1]):'—')+'<\u002Ftd><td>'+(wn?esc(wn.p1+'/'+wn.p2):'—')+'<\u002Ftd><\u002Ftr>';\n        });\n        out += '<\u002Ftable>';\n      };\n      if(div.format==='compass'){ const c=this.buildCompass(div); scan(c.E,'East'); scan(c.W,'West'); scan(c.N,'North'); scan(c.S,'South'); }\n      else if(div.format==='double'){ const d=this.buildDouble(div); scan(d.W,'Winners'); scan(d.L,'Losers'); scan(d.GF,'Grand Final'); }\n      else { scan(computeBracket(div.teams, div.results, ''), 'Bracket'); }\n    }\n    return out;\n  }\n\n  printReport(){\n    const s = this.state;\n    const esc = (x)=>String(x==null?'':x).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n    const now = new Date();\n    const stamp = now.toLocaleString();\n    let courtRows = '';\n    for(let c=1;c<=(s.courts||4
